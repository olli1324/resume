ion then applies the chain rule from output to input, computing local gradients of each layer's output with respect to its inputs and parameters. These gradients are multiplied by the upstream error signal to obtain the gradient of the loss with respect to each weight. Gradient descent then takes a step opposite to that gradient, scaled by the learning rate."}, {"prompt": "Contrast convolutional and fully connected layers in 3-4 sentences.", "sample_answer": "A fully connected layer wires every input unit to every output unit, so parameter counts scale with input size. Convolutional layers use a small kernel that slides over the input, sharing weights across spatial positions. This exploits local structure and translation equivariance, giving many fewer parameters and better inductive bias for images. Convolutional stacks progressively enlarge the receptive field so deeper layers can capture global structure."}, {"prompt": "Explain why ReLU networks train faster than sigmoid networks.", "sample_answer": "ReLU has a gradient of 1 for positive activations, so error signals flow through many layers without shrinking, alleviating the vanishing-gradient problem. It is also cheap to compute, avoiding exponentials. Sparsity from zeroed negatives can further regularize and speed up training. The main risk is dying ReLUs, mitigated by leaky or PReLU variants."}, {"prompt": "Describe the role of pooling in a CNN and its trade-offs.", "sample_answer": "Pooling reduces spatial resolution while preserving the strongest activations in each window. It provides mild translation invariance and cuts the number of parameters needed downstream. However, aggressive pooling discards spatial detail that matters for segmentation or fine localization. Modern architectures often replace pooling with strided convolutions for more learnable downsampling."}, {"prompt": "How would you decide when to use a CNN over an MLP?", "sample_answer": "Choose a CNN when the input has spatial or temporal structure that benefits from local receptive fields and weight sharing, such as images, spectrograms, or 1D signals. An MLP is fine for small tabular data where features have no natural ordering. CNNs vastly reduce parameter counts on high-dimensional inputs and generalize better. The trade-off is architectural complexity and the need for larger training sets when spatial priors are wrong."}], "pitfalls": ["Using sigmoid activations in deep networks and then blaming slow training on the optimizer.", "Forgetting to normalize inputs, causing gradient scale issues.", "Applying dropout during evaluation.", "Confusing stride with kernel size when computing output dimensions.", "Assuming a fully connected head is required after every CNN backbone."]}, {"id": 7, "title": "Recurrent Neural Networks and LSTM", "overview": "Motivates RNNs for variable-length sequences, then walks through the standard RNN forward pass, backpropagation through time, and the vanishing/exploding gradient problem that follows. Introduces LSTM cells with input, forget, and output gates as a fix, and discusses bidirectional variants and typical use cases like captioning, sentiment, and translation.", "concepts": [{"term": "Recurrent Neural Network", "definition": "Neural network that maintains a hidden state passed across time steps, enabling processing of variable-length sequences."}, {"term": "Hidden state", "definition": "Vector s(t) summarizing the history of the sequence up to time t."}, {"term": "Unfolding in time", "definition": "Representation of the RNN as a deep feedforward network with shared weights across time steps."}, {"term": "BPTT", "definition": "Backpropagation Through Time; applies backprop to the unfolded network to compute gradients."}, {"term": "Vanishing gradient", "definition": "Gradients shrink exponentially over many time steps, preventing learning of long dependencies."}, {"term": "Exploding gradient", "definition": "Gradients grow exponentially, causing NaNs or unstable updates; usually handled by clipping."}, {"term": "Gradient clipping", "definition": "Rescales the gradient when its norm exceeds a threshold to keep updates stable."}, {"term": "LSTM", "definition": "Long Short-Term Memory cell that adds a memory cell and multiplicative gates to keep gradients flowing across many steps."}, {"term": "Input gate (i)", "definition": "Controls how much new candidate information is written to the cell state."}, {"term": "Forget gate (f)", "definition": "Controls how much of the previous cell state is retained."}, {"term": "Output gate (o)", "definition": "Controls how much of the cell state is exposed as the hidden state."}, {"term": "Cell state (C)", "definition": "Additive memory that carries information over long spans with only element-wise gating."}, {"term": "Bidirectional RNN", "definition": "Runs two RNNs, one forward and one backward in time, then concatenates their hidden states."}, {"term": "Sequence-to-sequence tasks", "definition": "Applications like translation or captioning where inputs and outputs are sequences."}], "formulas": [{"name": "RNN hidden update", "latex": "s_t = \\varphi(U x_t + W s_{t-1})", "note": "Combines new input and previous hidden state."}, {"name": "RNN output", "latex": "o_t = \\varphi_o(V s_t)", "note": "Linear projection through V then non-linearity."}, {"name": "LSTM forget gate", "latex": "f_t = \\sigma(W_f [h_{t-1}, x_t] + b_f)", "note": "Sigmoid gate deciding how much of C_{t-1} to keep."}, {"name": "LSTM cell update", "latex": "C_t = f_t \\odot C_{t-1} + i_t \\odot \\tilde{C}_t", "note": "Additive memory pathway keeps gradient flow stable."}, {"name": "LSTM hidden output", "latex": "h_t = o_t \\odot \\tanh(C_t)", "note": "Output gate masks the exposed cell state."}], "mcqs": [{"q": "Which problem does an LSTM primarily address in vanilla RNNs?", "options": ["Overfitting", "Vanishing gradients for long-range dependencies", "Slow forward pass", "Batch normalization"], "correct": 1, "explanation": "LSTMs keep a nearly constant error flow via the gated cell state."}, {"q": "The forget gate in an LSTM outputs values in:", "options": ["(-1, 1)", "(0, 1)", "R", "[0, infinity)"], "correct": 1, "explanation": "It's a sigmoid, so each element is between 0 and 1."}, {"q": "BPTT unrolls the RNN so that:", "options": ["Each time step has different weights", "The network becomes a deep feedforward net with shared weights across steps", "The gradients disappear automatically", "Only forward pass is used"], "correct": 1, "explanation": "Time steps share weights but are treated as consecutive layers for backprop."}, {"q": "A bidirectional RNN can be used when:", "options": ["Streaming decisions require causal input", "The entire input sequence is available at inference time", "Only classification tasks", "Only for images"], "correct": 1, "explanation": "It needs future context, so it cannot be used in strict streaming."}, {"q": "Which is a standard remedy for exploding gradients?", "options": ["Sigmoid activation", "Gradient clipping", "Batch normalization", "Adding more layers"], "correct": 1, "explanation": "Clipping keeps the gradient norm bounded before applying the update."}, {"q": "In an LSTM, the cell state C_t is updated by:", "options": ["Overwriting with a new value", "Elementwise gated combination of the old cell state and the candidate cell content", "Multiplying by the input", "Sampling from a normal distribution"], "correct": 1, "explanation": "The forget gate keeps history and the input gate adds new content."}, {"q": "Which task is best suited for a many-to-one RNN?", "options": ["Machine translation", "Sentiment classification of a sentence", "Image captioning", "Video generation"], "correct": 1, "explanation": "A sequence is consumed and a single label is produced at the end."}, {"q": "A vanilla RNN typically struggles beyond how many time steps?", "options": ["Millions", "Roughly a few dozen without special techniques", "Exactly 100000", "Always fine at any horizon"], "correct": 1, "explanation": "Practical vanishing usually kicks in within a few dozen steps."}, {"q": "Setting the LSTM forget gate to all zeros and input gate to all ones recovers:", "options": ["A skip connection", "A vanilla RNN cell that forgets past cell state and writes all new info", "An MLP", "A transformer"], "correct": 1, "explanation": "That configuration removes memory and passes new information straight through, similar to a plain RNN."}, {"q": "Compared to a CNN, an RNN is better suited to:", "options": ["Fixed-size images", "Variable-length sequential data", "Static tabular features", "Batch processing"], "correct": 1, "explanation": "RNNs handle variable input lengths and preserve order."}], "flashcards": [{"front": "State one advantage of RNNs over feedforward networks.", "back": "They can process inputs of variable length while sharing weights across time."}, {"front": "Give the hidden state update of a simple RNN.", "back": "s_t = phi(U x_t + W s_{t-1})."}, {"front": "What does BPTT stand for?", "back": "Backpropagation Through Time."}, {"front": "Cause of vanishing gradients?", "back": "Repeated multiplication by small derivatives shrinks the gradient exponentially with sequence length."}, {"front": "Purpose of the LSTM cell state?", "back": "Preserve long-range information with additive updates that avoid vanishing gradients."}, {"front": "Role of the input gate?", "back": "Decides how much new candidate information is written into the cell state."}, {"front": "Role of the output gate?", "back": "Decides how much of the cell state is exposed as the hidden output."}, {"front": "Give one downside of bidirectional RNNs.", "back": "They require the entire sequence up front, so they cannot run in strict streaming mode."}, {"front": "One standard fix for exploding gradients?", "back": "Gradient clipping."}, {"front": "What does 'unrolling' an RNN mean?", "back": "Representing it as a deep network with one layer per time step and tied weights."}, {"front": "How does an LSTM prevent vanishing gradients?", "back": "The cell state has an almost-linear pathway across time controlled by gates, keeping the gradient near constant."}, {"front": "Give two RNN applications.", "back": "Machine translation, sentiment classification, sequence tagging, image captioning."}, {"front": "Simplify LSTM to recover vanilla RNN behavior.", "back": "Set forget gate to 0 and input/output gates to 1."}, {"front": "How is the initial hidden state usually chosen?", "back": "Set to zeros or learned as a parameter."}, {"front": "Difference between many-to-one and many-to-many RNNs?", "back": "Many-to-one emits one label after consuming the sequence; many-to-many emits one output per time step."}], "short_answer": [{"prompt": "Explain how the LSTM cell state helps propagate gradients across many time steps.", "sample_answer": "The cell state is updated by elementwise addition rather than multiplication by the recurrent matrix, and by gates that can pass information unchanged. During backpropagation the gradient flowing through the cell state is scaled by the forget-gate values, not by repeated Jacobians. If the forget gates stay near one, gradients decay very slowly and long-range dependencies remain trainable. That is why LSTMs can handle sequences hundreds of steps long."}, {"prompt": "Describe BPTT and one practical difficulty of it.", "sample_answer": "BPTT unrolls the RNN in time and applies standard backprop over the resulting deep feedforward network with shared weights. Gradients from all time steps are accumulated into each shared weight. In practice, unrolling long sequences is memory-hungry and prone to vanishing or exploding gradients. Truncated BPTT limits the horizon to a fixed window and combines with gradient clipping to keep training stable."}, {"prompt": "Contrast a vanilla RNN with an LSTM in 3-4 sentences.", "sample_answer": "A vanilla RNN updates a single hidden state through a non-linearity, which is compact but suffers vanishing gradients and short memory. An LSTM adds a separate cell state and three gates, letting the network learn what to store, forget, and expose. This gives explicit control over memory and stable gradients across many steps. The trade-off is more parameters and slower per-step computation."}, {"prompt": "Give a case where a bidirectional RNN is preferable to a unidirectional one and explain why.", "sample_answer": "Named entity recognition over a full sentence benefits from both left and right context, since tokens like 'the bank' depend on later words to be disambiguated. A bidirectional RNN gives access to future tokens for each position and typically improves labeling accuracy. It is inappropriate for streaming applications like real-time speech transcription where future context is unavailable. In that case a unidirectional or windowed model is required."}, {"prompt": "How does an LSTM cell balance short-term and long-term information?", "sample_answer": "The forget gate erases past cell content that is no longer needed, while the input gate writes fresh candidate information from the current step. Together they let each dimension of memory either persist for many steps or refresh quickly. The output gate then reveals only the parts of memory useful right now. This gating mechanism lets the LSTM handle multi-scale temporal patterns in one architecture."}], "pitfalls": ["Forgetting to clip gradients when training on long sequences.", "Using bidirectional RNNs in streaming or online settings.", "Comparing RNN and LSTM without normalizing for parameter count.", "Ignoring that LSTM cell state and hidden state are distinct tensors.", "Assuming BPTT scales for free with very long sequences without truncation."]}, {"id": 8, "title": "Deep Learning for Image Analysis", "overview": "Surveys the modern DL pipeline for image tasks: classification, semantic segmentation (U-Net), classification plus localization, object detection (R-CNN family, YOLO, SSD), and instance segmentation with Mask R-CNN. Frames the design trade-offs between accuracy, speed, and architectural complexity across the object detection zoo.", "concepts": [{"term": "Semantic segmentation", "definition": "Assign a class label to every pixel in the image without distinguishing individual instances."}, {"term": "Instance segmentation", "definition": "Assign per-pixel labels and also separate individual object instances."}, {"term": "Fully convolutional network", "definition": "CNN with only convolutions producing spatial outputs, allowing dense prediction like segmentation."}, {"term": "U-Net", "definition": "Encoder-decoder architecture with skip connections that combine high-res spatial features with low-res semantic features."}, {"term": "Classification + localization", "definition": "Predict a class label and a bounding box for a single object in the image."}, {"term": "Object detection", "definition": "Detect and localize multiple objects and classify each with bounding boxes."}, {"term": "Region proposals", "definition": "Candidate object regions produced by algorithms such as selective search or Region Proposal Networks."}, {"term": "R-CNN", "definition": "Runs a CNN on region proposals then classifies each; slow due to per-region computation."}, {"term": "Fast R-CNN", "definition": "Extracts features once and applies RoI pooling to region proposals to share computation."}, {"term": "Faster R-CNN", "definition": "Uses a Region Proposal Network sharing the backbone to generate proposals inside the network."}, {"term": "YOLO", "definition": "Single-shot detector predicting boxes and classes on a grid using anchors, optimized for speed."}, {"term": "SSD", "definition": "Single Shot Detector that predicts on multiple feature-map scales for better accuracy than YOLO."}, {"term": "Mask R-CNN", "definition": "Extends Faster R-CNN with a per-instance segmentation head over RoIs."}, {"term": "IoU", "definition": "Intersection over Union between predicted and ground-truth boxes; used to score detections."}, {"term": "Non-max suppression", "definition": "Removes duplicate detections by keeping the highest-scoring box and suppressing overlapping lower-scoring ones."}], "formulas": [{"name": "Intersection over Union", "latex": "\\text{IoU}(A, B) = \\frac{|A \\cap B|}{|A \\cup B|}", "note": "Threshold typically 0.5 for a positive match."}, {"name": "Cross-entropy pixel loss", "latex": "L = -\\frac{1}{HW}\\sum_{i,j} y_{i,j} \\log \\hat{p}_{i,j}", "note": "Standard segmentation loss over pixels."}, {"name": "Multi-task detection loss", "latex": "L = L_{cls} + \\lambda L_{box}", "note": "Combines classification with box regression losses."}], "mcqs": [{"q": "Semantic segmentation labels:", "options": ["Every pixel with a class but does not separate instances", "Only bounding boxes", "Only the largest object", "Object contours as vectors"], "correct": 0, "explanation": "Each pixel gets a class label; two adjacent cows share the same label."}, {"q": "U-Net achieves precise localization by:", "options": ["Using dropout", "Concatenating encoder features into the decoder via skip connections", "Increasing pool size", "Removing convolution"], "correct": 1, "explanation": "Skip connections carry high-resolution features to the decoder."}, {"q": "R-CNN's main bottleneck is:", "options": ["Loss function", "Running a CNN forward per region proposal", "Batch size", "Pooling"], "correct": 1, "explanation": "Roughly 2000 forward passes per image make it slow."}, {"q": "Faster R-CNN speeds up R-CNN by:", "options": ["Removing classification", "Using a Region Proposal Network sharing the backbone features", "Using DBSCAN", "Skipping non-max suppression"], "correct": 1, "explanation": "RPN produces proposals from the same feature map, avoiding external methods."}, {"q": "YOLO predicts multiple boxes per grid cell using:", "options": ["Selective search", "Anchor boxes with class-conditional confidence", "Depth-wise MLPs", "SVMs"], "correct": 1, "explanation": "Each cell has anchors and predicts offsets, classes, and confidences."}, {"q": "SSD improves accuracy over YOLO by:", "options": ["Using region proposals", "Making predictions on multiple feature-map scales", "Using recurrent networks", "Dropping non-max suppression"], "correct": 1, "explanation": "Multi-scale feature maps capture objects of different sizes."}, {"q": "Non-max suppression is used to:", "options": ["Remove low-confidence classes", "Suppress overlapping duplicate detections", "Compute IoU", "Warm up training"], "correct": 1, "explanation": "Keeps the highest-confidence box among overlapping candidates."}, {"q": "Mask R-CNN outputs, in addition to a class and box:", "options": ["A single global mask", "A per-instance binary mask over the RoI", "A depth map", "A caption"], "correct": 1, "explanation": "It has a segmentation head over each detected region."}, {"q": "Which network is fastest but least accurate among the following?", "options": ["Faster R-CNN", "YOLO", "SSD", "Mask R-CNN"], "correct": 1, "explanation": "YOLO trades some accuracy for real-time speed."}, {"q": "A key trade-off between two-stage and single-shot detectors is:", "options": ["Two-stage is faster and less accurate", "Single-shot is faster but usually less accurate", "Two-stage detectors do not use CNNs", "Single-shot detectors cannot detect multiple classes"], "correct": 1, "explanation": "Single-shot networks skip a proposal stage for speed at some accuracy cost."}], "flashcards": [{"front": "Difference between semantic and instance segmentation?", "back": "Semantic assigns per-pixel classes; instance also separates individual object instances."}, {"front": "What is a fully convolutional network?", "back": "A CNN made of only convolutional and upsampling layers that outputs spatial maps."}, {"front": "Purpose of U-Net skip connections?", "back": "Carry high-resolution features from encoder to decoder to preserve spatial detail."}, {"front": "How does Fast R-CNN differ from R-CNN?", "back": "It runs the CNN once and applies RoI pooling on proposals, sharing computation."}, {"front": "What does the RPN inside Faster R-CNN produce?", "back": "Objectness scores and box offsets for anchors at each spatial location."}, {"front": "Why do YOLO and SSD use anchor boxes?", "back": "Predefined shapes make the regression target easier to learn for objects of various sizes."}, {"front": "State the IoU threshold commonly used to declare a true positive.", "back": "0.5."}, {"front": "How does Mask R-CNN improve over Faster R-CNN?", "back": "Adds a parallel segmentation head that outputs a mask per RoI."}, {"front": "Give one advantage of YOLO.", "back": "Real-time inference speed on a single forward pass."}, {"front": "Give one weakness of YOLO.", "back": "Struggles on small or clustered objects."}, {"front": "How is classification + localization typically framed as a loss?", "back": "Classification cross-entropy plus L1/L2 loss on the box coordinates."}, {"front": "Why is naive sliding-window segmentation impractical?", "back": "It runs a CNN over every possible crop, which is prohibitively expensive."}, {"front": "What does non-max suppression do?", "back": "Keeps the highest-confidence box and drops overlapping duplicates."}, {"front": "Two paths of a U-Net?", "back": "Encoder (contraction) that captures 'what' and decoder (expansion) that recovers 'where'."}, {"front": "Trade-off between two-stage and single-shot detectors?", "back": "Two-stage tends to be more accurate; single-shot is much faster."}], "short_answer": [{"prompt": "Explain the encoder-decoder pattern in U-Net and why skip connections matter.", "sample_answer": "The encoder progressively downsamples the input to capture semantic content but loses spatial detail. The decoder upsamples back to the original resolution to make per-pixel predictions. Skip connections concatenate matching encoder features into the decoder, feeding back high-resolution spatial cues that would otherwise be lost. Without them the output would be semantically correct but spatially blurry."}, {"prompt": "Trace the evolution from R-CNN to Faster R-CNN.", "sample_answer": "R-CNN generated region proposals with selective search and applied a CNN to each, which was slow. Fast R-CNN reused a single CNN feature map for the whole image and applied RoI pooling per proposal, sharing computation. Faster R-CNN replaced the external proposal generator with a Region Proposal Network sharing the same backbone. The overall result is real-time proposal generation and much faster training and inference."}, {"prompt": "Compare YOLO and Faster R-CNN in terms of speed and accuracy.", "sample_answer": "YOLO is a single-shot detector that predicts boxes and classes over a grid in one forward pass, giving very high inference throughput. Faster R-CNN uses a proposal network plus a per-RoI head, which is slower but usually more accurate especially on small objects. YOLO also suffers on clustered objects because a grid cell can only emit a limited number of boxes. In practice, Faster R-CNN is preferred when accuracy matters and latency is less critical."}, {"prompt": "How does Mask R-CNN produce instance segmentations?", "sample_answer": "It builds on Faster R-CNN by adding a segmentation branch that operates in parallel with the classification and box heads. For each Region of Interest, RoIAlign extracts a fixed-size feature block preserving alignment, and a small FCN outputs a binary mask per class. Only the mask for the predicted class is used at inference. This decouples class and mask prediction, avoiding competition between classes."}, {"prompt": "Describe the multi-task loss used for classification plus localization.", "sample_answer": "The network has two heads sharing a backbone: a classifier head with cross-entropy loss and a regression head predicting box coordinates with an L1 or smooth-L1 loss. The total loss is a weighted sum, with the weight tuned on validation data. Sharing the backbone lets features benefit both tasks. This joint training is more effective than optimizing the two heads independently."}], "pitfalls": ["Ignoring class imbalance between foreground and background boxes in detection.", "Applying downsampling too aggressively in a U-Net and losing fine detail.", "Forgetting non-max suppression, leading to duplicate detections.", "Using naive RoI pooling with quantization for tasks that need pixel alignment.", "Comparing detectors on different image sizes without normalizing FPS or accuracy."]}, {"id": 9, "title": "Uncertainty in Deep Learning", "overview": "Explains why softmax classifiers are overconfident, distinguishes epistemic from aleatoric uncertainty, and covers Bayesian deep learning with variational inference, MC dropout, and deep ensembles. Also covers softmax calibration, test-time augmentation, transfer learning, and self-supervised representations for domains with limited labels.", "concepts": [{"term": "Softmax overconfidence", "definition": "Standard classifiers can output high-confidence predictions even on out-of-distribution inputs."}, {"term": "Epistemic uncertainty", "definition": "Uncertainty in the model parameters; can be reduced with more data."}, {"term": "Aleatoric uncertainty", "definition": "Inherent noise in the observations; cannot be explained away by more data."}, {"term": "Homoscedastic vs heteroscedastic noise", "definition": "Homoscedastic: noise level constant; heteroscedastic: noise varies per input."}, {"term": "Bayesian Neural Network", "definition": "Treats weights as random variables with a posterior distribution given data."}, {"term": "Variational inference", "definition": "Approximates the intractable posterior by a tractable family, minimizing KL divergence to the true posterior."}, {"term": "ELBO", "definition": "Evidence Lower Bound; a lower bound on log evidence that variational inference maximizes."}, {"term": "Reparameterization trick", "definition": "Rewrites w = mu + sigma * epsilon so gradients flow through mu and sigma, enabling backprop."}, {"term": "MC Dropout", "definition": "Enables dropout at inference and averages predictions over multiple stochastic passes to approximate Bayesian uncertainty."}, {"term": "MCMC", "definition": "Markov Chain Monte Carlo sampling from the posterior via proposals like Metropolis-Hastings."}, {"term": "Deep ensembles", "definition": "Train several networks with different random seeds and average predictions; strong baseline for uncertainty."}, {"term": "Test-time augmentation", "definition": "Perturb the input at inference with random augmentations and aggregate predictions to expose aleatoric uncertainty."}, {"term": "Temperature scaling", "definition": "Post-hoc calibration that scales logits by a temperature parameter fit on a validation set."}, {"term": "Out-of-distribution detection", "definition": "Recognizing inputs drawn from a different distribution than training data."}, {"term": "Self-supervised learning", "definition": "Learn representations by predicting parts of the input from other parts, without human labels."}], "formulas": [{"name": "Bayes' rule for weights", "latex": "p(\\theta|D) = \\frac{p(D|\\theta) p(\\theta)}{p(D)}", "note": "Posterior over network weights."}, {"name": "ELBO", "latex": "\\mathrm{ELBO}(q) = \\mathbb{E}_{q(\\theta)}[\\log p(D|\\theta)] - \\mathrm{KL}(q(\\theta) \\| p(\\theta))", "note": "Variational objective."}, {"name": "Reparameterization", "latex": "\\theta = \\mu + \\sigma \\odot \\epsilon, \\quad \\epsilon \\sim \\mathcal{N}(0, I)", "note": "Separates deterministic parameters from noise."}, {"name": "Softmax with temperature", "latex": "p_i = \\frac{\\exp(z_i / T)}{\\sum_j \\exp(z_j / T)}", "note": "T > 1 softens predictions; used in temperature scaling."}, {"name": "Cross-entropy loss", "latex": "L_{CE} = -\\frac{1}{n}\\sum_i \\left[y_i \\log p_i + (1 - y_i) \\log (1 - p_i)\\right]", "note": "Equivalent to minimizing negative log-likelihood under a Bernoulli model."}], "mcqs": [{"q": "Why is a standard CNN's softmax overconfident on OOD inputs?", "options": ["It is trained to minimize entropy", "Cross-entropy pushes the logit of the correct class to grow indefinitely", "It only supports two classes", "It uses ReLU"], "correct": 1, "explanation": "Training encourages one logit to dominate, so the softmax is sharp everywhere."}, {"q": "Epistemic uncertainty:", "options": ["Cannot be reduced with more data", "Reflects uncertainty in model parameters and shrinks with data", "Is the same as aleatoric", "Depends only on input noise"], "correct": 1, "explanation": "Epistemic uncertainty is 'knowledge' uncertainty and improves with data."}, {"q": "MC Dropout approximates:", "options": ["Standard SGD", "Bayesian posterior via multiple stochastic forward passes", "Batch normalization", "Adam's momentum"], "correct": 1, "explanation": "Keeping dropout on at test time samples from an approximate posterior."}, {"q": "The reparameterization trick lets us:", "options": ["Skip backprop", "Backprop through a stochastic layer by isolating noise from parameters", "Compute the exact posterior", "Compress the network"], "correct": 1, "explanation": "Sampling z ~ N(mu, sigma) is written as mu + sigma * eps so gradients pass through."}, {"q": "Temperature scaling calibrates by:", "options": ["Retraining the network", "Multiplying logits by 1/T fit on a validation set", "Adding dropout", "Removing softmax"], "correct": 1, "explanation": "It softens or sharpens confidences without changing predicted classes."}, {"q": "Which best captures aleatoric uncertainty?", "options": ["Ensemble variance", "Test-time augmentation over stochastic inputs", "Weight prior", "Softmax temperature"], "correct": 1, "explanation": "TTA perturbs inputs and models data-dependent noise."}, {"q": "Which is NOT a source of uncertainty an ensemble can flag?", "options": ["Points where members disagree", "Points where all members are equally wrong for the same reason", "OOD points where confidence drops", "Points near class boundaries"], "correct": 1, "explanation": "Ensembles fail to flag correlated errors shared by all members."}, {"q": "ELBO stands for:", "options": ["Evidence Lower Bound", "Estimated Local Bayesian Objective", "Empirical Loss Bounded Output", "Expected Log-Bayesian Objective"], "correct": 0, "explanation": "It bounds the log-evidence from below."}, {"q": "Self-supervised learning is useful because:", "options": ["It requires labeled data", "It learns representations from unlabeled data via pretext tasks", "It replaces optimization", "It removes the need for a loss"], "correct": 1, "explanation": "The model constructs its own labels from structure in the input."}, {"q": "A calibrated classifier means:", "options": ["Its predicted probabilities match empirical frequencies", "Its accuracy is 100%", "It ignores confidence", "It never overfits"], "correct": 0, "explanation": "If it says '80% dog', 80% of such predictions should be correct."}], "flashcards": [{"front": "Two types of uncertainty in ML?", "back": "Epistemic (model) and aleatoric (data)."}, {"front": "How does MC dropout give uncertainty?", "back": "Multiple stochastic forward passes with dropout on, then average and measure variance."}, {"front": "Why is naive softmax not enough for OOD detection?", "back": "Softmax can be arbitrarily confident on inputs outside the training distribution."}, {"front": "State the ELBO in words.", "back": "Expected log-likelihood minus KL divergence from prior."}, {"front": "Purpose of the reparameterization trick?", "back": "Enable gradient flow through sampled parameters by isolating noise from deterministic parameters."}, {"front": "One advantage of deep ensembles over MC dropout?", "back": "Ensembles typically give better-calibrated uncertainties and higher accuracy."}, {"front": "Temperature scaling: does it change predicted class?", "back": "No; it only rescales probabilities."}, {"front": "Homoscedastic vs heteroscedastic noise?", "back": "Homoscedastic is constant across inputs; heteroscedastic varies per input."}, {"front": "One weakness of Bayes by backprop?", "back": "Doubles the number of parameters (mean and variance) and increases compute cost."}, {"front": "Give a self-supervised pretext task.", "back": "Predict rotation of an image, solve a jigsaw of patches, or image inpainting."}, {"front": "Why is transfer learning useful in biomedical imaging?", "back": "Labeled data is scarce so pretraining on natural images provides useful low-level features."}, {"front": "What does negative transfer mean?", "back": "The source knowledge hurts target performance because domains are too dissimilar."}, {"front": "Two calibration diagnostics?", "back": "Reliability diagram and Expected Calibration Error (ECE)."}, {"front": "What captures more information than MC dropout on aleatoric uncertainty?", "back": "Test-time augmentation, since it perturbs the input."}, {"front": "Why can't aleatoric uncertainty be reduced with more data?", "back": "It reflects noise inherent in the labels or observations, not lack of knowledge."}], "short_answer": [{"prompt": "Explain how variational inference is used to train a Bayesian neural network.", "sample_answer": "Variational inference posits a tractable family q(theta; phi), typically a factorized Gaussian, to approximate the true posterior p(theta|D). We maximize the ELBO, which trades data fit against KL divergence from the prior. Using the reparameterization trick we express theta as mu + sigma * eps, so gradients flow through mu and sigma. Predictions at test time integrate over q via Monte Carlo sampling."}, {"prompt": "Compare epistemic and aleatoric uncertainty and how to model each.", "sample_answer": "Epistemic uncertainty describes what the model doesn't know about the mapping, and it can be estimated using Bayesian NNs, MC dropout, or ensembles. Aleatoric uncertainty is noise in the data itself; homoscedastic and heteroscedastic variants can be modeled by predicting a per-sample variance or by test-time augmentation. Epistemic uncertainty shrinks as more data arrives, aleatoric stays. In practice both should be reported for high-stakes decisions."}, {"prompt": "Explain temperature scaling and when it fails.", "sample_answer": "Temperature scaling divides logits by a scalar T fit on validation data to minimize NLL or ECE, softening or sharpening predicted probabilities. It preserves the argmax, so accuracy stays constant. It works well when miscalibration is monotone across classes and consistent across the input space. It fails to help under distribution shift, since the calibration parameter is tied to the validation distribution."}, {"prompt": "Describe how MC dropout approximates Bayesian inference.", "sample_answer": "Interpreting dropout as a Bernoulli variational approximation, training with dropout also fits a distribution over weights. At inference we keep dropout on and sample T stochastic forward passes, giving T predictions per input. The mean is the predicted output and the variance is the epistemic uncertainty. It is cheap and drop-in, but the induced posterior family is restrictive."}, {"prompt": "Why are self-supervised representations attractive for medical imaging?", "sample_answer": "Labels in medical imaging require expert annotators and cannot be scaled cheaply. Self-supervised learning defines pretext tasks like rotation prediction, jigsaw solving, or contrastive learning that need no labels, and yields transferable features. Finetuning on a small labeled dataset then works better and reduces overfitting. It also gives better OOD robustness because the representation is not biased toward a narrow supervised task."}], "pitfalls": ["Assuming softmax probability is a reliable uncertainty score.", "Confusing epistemic and aleatoric uncertainty when reporting results.", "Fitting temperature scaling on the test set instead of a held-out validation set.", "Using MC dropout on a network without any dropout layers at training time.", "Trusting Bayesian NN posteriors without checking predictive calibration."]}, {"id": 10, "title": "Generative Models", "overview": "Introduces encoders and decoders, autoencoders, variational autoencoders, generative adversarial networks, and diffusion models. Covers the trade-offs between them: VAEs give smooth latent spaces but blurry samples; GANs give sharp samples but suffer mode collapse; diffusion models achieve state-of-the-art quality at higher inference cost.", "concepts": [{"term": "Encoder", "definition": "Neural network that compresses input into a lower-dimensional latent representation."}, {"term": "Decoder", "definition": "Neural network that maps a latent representation back to the input space using upsampling."}, {"term": "Transposed convolution", "definition": "Learned upsampling operation that increases feature-map size; can produce checkerboard artifacts."}, {"term": "Bilinear interpolation", "definition": "Parameter-free upsampling by linear interpolation between the four nearest points."}, {"term": "Autoencoder", "definition": "Encoder plus decoder trained to reconstruct the input, learning an efficient latent representation."}, {"term": "Perceptual loss", "definition": "Distance in the feature space of a pretrained network; more aligned with human similarity than MSE."}, {"term": "Variational Autoencoder", "definition": "Autoencoder whose encoder outputs a distribution over latents; trained with reconstruction plus KL to a prior."}, {"term": "Latent space", "definition": "Compressed representation space where similar inputs map to nearby points."}, {"term": "KL divergence term", "definition": "Regularizer in VAE that pulls the posterior close to the prior N(0, I)."}, {"term": "GAN", "definition": "Generator vs discriminator adversarial training producing samples from a data distribution."}, {"term": "Mode collapse", "definition": "GAN pathology where the generator only produces a subset of the training modes."}, {"term": "R1 penalty", "definition": "Regularizes discriminator gradients on real samples to stabilize GAN training."}, {"term": "Spectral normalization", "definition": "Constrains the spectral norm of layers to control Lipschitz constant of the discriminator."}, {"term": "FID", "definition": "Frechet Inception Distance; compares feature distributions of real and generated samples."}, {"term": "Diffusion model", "definition": "Trains a denoising network across noise schedules and generates by iteratively denoising Gaussian noise."}], "formulas": [{"name": "VAE ELBO", "latex": "\\mathcal{L} = \\mathbb{E}_{q(z|x)}[\\log p(x|z)] - \\mathrm{KL}(q(z|x) \\| p(z))", "note": "Balances reconstruction and KL regularization."}, {"name": "GAN objective", "latex": "\\min_G \\max_D \\; \\mathbb{E}_{x \\sim p_{\\text{data}}}[\\log D(x)] + \\mathbb{E}_{z}[\\log(1 - D(G(z)))]", "note": "Minmax game between generator and discriminator."}, {"name": "R1 penalty", "latex": "R_1 = \\frac{\\gamma}{2} \\mathbb{E}_{x \\sim p_{\\text{data}}}[\\|\\nabla_x D(x)\\|^2]", "note": "Stabilizes GAN training by shrinking discriminator gradients on real data."}, {"name": "Reparameterization for VAE", "latex": "z = \\mu(x) + \\sigma(x) \\odot \\epsilon, \\quad \\epsilon \\sim \\mathcal{N}(0, I)", "note": "Enables backprop through the stochastic sampling."}, {"name": "Diffusion forward noising", "latex": "x_t = \\sqrt{\\bar\\alpha_t} x_0 + \\sqrt{1 - \\bar\\alpha_t}\\, \\epsilon", "note": "Direct sampling of a noisy image at step t given the schedule."}], "mcqs": [{"q": "Why can vanilla autoencoders fail to produce meaningful samples via latent interpolation?", "options": ["They lack a decoder", "There is no constraint on the latent space, so intermediate points can lie off the data manifold", "They use ReLU", "They compress too much"], "correct": 1, "explanation": "Without a regularizer, the latent space is fragmented and interpolation produces garbage."}, {"q": "The VAE KL term forces the encoder to output distributions close to:", "options": ["Uniform", "The prior, typically N(0, I)", "A delta function", "The empirical data distribution"], "correct": 1, "explanation": "The KL divergence to the prior pulls the posterior toward N(0, I)."}, {"q": "Mode collapse in GANs means:", "options": ["The generator produces high-diversity samples", "The generator maps many latents to only a few outputs", "The discriminator wins forever", "The generator diverges to noise"], "correct": 1, "explanation": "Generator diversity collapses despite the discriminator's efforts."}, {"q": "Perceptual loss is preferred over MSE because:", "options": ["It is faster", "It is closer to human notion of image similarity", "It has zero variance", "It ignores training data"], "correct": 1, "explanation": "It measures distance in a pretrained feature space, insensitive to small pixel shifts."}, {"q": "Diffusion models generate by:", "options": ["Sampling from the generator directly", "Iteratively denoising from Gaussian noise using a learned denoiser", "One forward pass through an encoder", "Sampling from a latent Bernoulli"], "correct": 1, "explanation": "They reverse a noise schedule step by step."}, {"q": "FID is computed by:", "options": ["Averaging pixel MSE", "Comparing feature distributions of real and generated images from a pretrained Inception model", "Counting mode collapse events", "Measuring GAN loss"], "correct": 1, "explanation": "FID is the Frechet distance between two Gaussians fit to Inception features."}, {"q": "Transposed convolution can cause:", "options": ["Vanishing gradients only", "Checkerboard artifacts when kernel size and stride are not aligned", "Higher precision", "Automatic denoising"], "correct": 1, "explanation": "Overlapping strides produce uneven contributions."}, {"q": "The main disadvantage of diffusion models compared to GANs is:", "options": ["Lower sample quality", "Slower inference due to multi-step denoising", "Cannot use CNNs", "Non-differentiable objective"], "correct": 1, "explanation": "Multi-step sampling makes inference much slower."}, {"q": "In a VAE, without the KL term, the model degenerates to:", "options": ["A random noise generator", "A standard autoencoder that can collapse variance to zero", "A GAN", "A diffusion model"], "correct": 1, "explanation": "Without KL, sigma can shrink to zero and the model becomes deterministic."}, {"q": "R1 penalty stabilizes GAN training by:", "options": ["Increasing discriminator gradients on real data", "Penalizing discriminator gradients on real data", "Removing the discriminator", "Adding dropout to the generator"], "correct": 1, "explanation": "Smaller gradients on real samples prevent overpowering the generator."}], "flashcards": [{"front": "Difference between AE and VAE?", "back": "AE encodes to a point; VAE encodes to a distribution and adds a KL prior."}, {"front": "Why is perceptual loss used for image generation?", "back": "It aligns better with human perception than pixel-wise MSE."}, {"front": "Give a sign of mode collapse.", "back": "The generator produces the same handful of images regardless of the input noise."}, {"front": "What does FID measure?", "back": "Frechet distance between Inception-feature distributions of real and generated samples."}, {"front": "Purpose of the reparameterization trick in a VAE?", "back": "Move stochasticity outside the parameters so gradients can flow through mu and sigma."}, {"front": "State the GAN objective as a minmax problem.", "back": "min_G max_D E[log D(x)] + E[log(1 - D(G(z)))]"}, {"front": "Why is training a GAN unstable?", "back": "The discriminator and generator loss shift constantly, and either can overpower the other."}, {"front": "One remedy for GAN instability?", "back": "R1 penalty, spectral normalization, gradient penalty, or Wasserstein loss."}, {"front": "Diffusion models achieve SOTA in which metrics?", "back": "FID and likelihood, particularly on diverse image datasets."}, {"front": "Give a downside of diffusion models.", "back": "Slow multi-step inference, 20-1000x slower than a comparable GAN."}, {"front": "Which upsampling method avoids checkerboard artifacts?", "back": "Bilinear or nearest-neighbor followed by a regular convolution."}, {"front": "Difference between VAE and GAN sample quality?", "back": "VAE samples tend to be blurrier due to Gaussian assumption; GANs are sharper but less diverse."}, {"front": "How is a diffusion model's noise schedule used at inference?", "back": "Iteratively remove predicted noise following the schedule from step T back to step 0."}, {"front": "What is a UNet used for in diffusion models?", "back": "The denoising backbone; encoder-decoder with skip connections predicts noise or clean image."}, {"front": "What is spectral normalization?", "back": "A constraint that limits the largest singular value of each weight matrix to stabilize training."}], "short_answer": [{"prompt": "Explain the role of the KL term in a VAE and what happens if it is removed.", "sample_answer": "The KL term pulls each encoded posterior q(z|x) toward a prior p(z), usually N(0, I), so the aggregated latent distribution matches the prior. This gives a continuous, structured latent space where interpolation and sampling produce plausible outputs. Without it, the encoder can collapse sigma to zero and the model degenerates to a plain autoencoder with a fragmented latent space. Sampling from N(0, I) at test time would then produce garbage."}, {"prompt": "Compare GANs and diffusion models on sample quality, diversity, and speed.", "sample_answer": "GANs generate very sharp samples in a single forward pass, giving fast inference. However, they often mode-collapse and cover only a subset of the data. Diffusion models produce diverse samples with high FID scores, at the cost of slow multi-step inference. In practice diffusion is preferred when quality and coverage matter, GANs when latency dominates."}, {"prompt": "Why is adversarial training an attractive way to define a loss function?", "sample_answer": "Hand-crafted losses like MSE embed rigid assumptions about similarity and often lead to blurry outputs. A discriminator network can learn a loss adapted to the data, penalizing whatever cue distinguishes fake from real. Because both networks train jointly, the loss keeps up with the generator's improvements. The downside is a shifting objective that can make training unstable."}, {"prompt": "Describe how a diffusion model is trained.", "sample_answer": "A forward process gradually adds Gaussian noise to real data over T steps according to a schedule. A neural network is trained to predict either the added noise or the clean image, conditioned on the noisy sample and the step index. The loss is a simple MSE between predicted and true noise. At inference the model iteratively denoises pure Gaussian noise following the schedule to produce a sample."}, {"prompt": "Explain FID and its role in evaluating generative models.", "sample_answer": "FID passes real and generated images through a pretrained Inception network and fits Gaussians to the resulting feature vectors. It reports the Frechet distance between the two Gaussians, a scalar summarizing both mean and covariance mismatch. Lower FID means the generated distribution matches the real one at the semantic feature level. Unlike inspection of raw pixels it correlates well with perceived quality."}], "pitfalls": ["Using MSE loss with a decoder and expecting sharp samples.", "Dropping the KL term when 'the reconstructions look better'.", "Judging GANs only by loss curves rather than sample diversity and FID.", "Confusing checkerboard artifacts with model bugs when they are caused by transposed convolutions.", "Assuming diffusion models are drop-in replacements for GANs in latency-critical apps."]}, {"id": 11, "title": "Bioinformatics and Neuromorphic Introduction", "overview": "Frames biology as an information-processing system and introduces bioinformatics tools for RNA and miRNA analysis (BioSeqZip, isomiR-SEA, LaRA2) plus deep learning for sequence data. It also motivates neuromorphic computing as brain-inspired, event-driven hardware distinct from Von Neumann digital computing.", "concepts": [{"term": "Central Dogma of Biology", "definition": "DNA is transcribed into RNA which is translated into proteins that carry out biological function."}, {"term": "Codon", "definition": "Three-nucleotide DNA/RNA unit encoding one amino acid, with 64 possible values."}, {"term": "miRNA", "definition": "Small non-coding RNA that regulates gene expression by binding complementary mRNA sequences."}, {"term": "Sequencing reads", "definition": "Short DNA/RNA fragments produced by sequencing machines, typically 10^7 per sample."}, {"term": "BioSeqZip", "definition": "C++ tool that collapses duplicate sequencing reads to speed up downstream alignment while limiting RAM usage."}, {"term": "isomiR-SEA", "definition": "miRNA-specific alignment tool exploiting the seed region and structural knowledge for accurate quantification."}, {"term": "LaRA2", "definition": "Sequence-structure alignment tool for RNAs that combines dynamic programming with combinatorial optimization."}, {"term": "Deep learning for genomics", "definition": "Using CNNs, RNNs, or transformers to classify sequences or predict regulatory features from raw nucleotides."}, {"term": "Meta-label / superclass", "definition": "Grouping related fine-grained classes so a model can share features and reduce label sparsity."}, {"term": "Neuromorphic engineering", "definition": "Design of brain-inspired hardware and algorithms using spikes and asynchronous event-driven computation."}, {"term": "Von Neumann bottleneck", "definition": "Latency and energy cost of moving data between CPU and separate memory in digital computers."}, {"term": "Spiking neural network (SNN)", "definition": "Third-generation neural network where neurons emit discrete spikes over time as their computation primitive."}, {"term": "Address Event Representation", "definition": "Encoding scheme where spikes are transmitted as timestamped addresses of the firing unit."}, {"term": "Neuromorphic sensor", "definition": "Event-based sensor such as a silicon retina or cochlea that outputs spikes only when the signal changes."}], "formulas": [{"name": "Number of codons", "latex": "4^3 = 64", "note": "Total possible codons over the alphabet {A, C, G, U}."}], "mcqs": [{"q": "The central dogma states:", "options": ["Proteins fold into DNA", "DNA -> RNA -> Protein", "RNA compiles into DNA", "Proteins encode DNA sequences"], "correct": 1, "explanation": "Information flows from DNA to RNA to protein."}, {"q": "How many codons exist in the standard genetic code?", "options": ["4", "16", "64", "256"], "correct": 2, "explanation": "Three positions, four choices each: 4^3 = 64."}, {"q": "BioSeqZip mainly reduces:", "options": ["Sequencing errors", "The number of reads passed to alignment by collapsing duplicates", "Cost of protein synthesis", "Memory required for cell simulation"], "correct": 1, "explanation": "It collapses recurrent reads to cut alignment time and RAM."}, {"q": "isomiR-SEA is specialized for:", "options": ["Whole-genome variant calling", "miRNA quantification with alignment based on seed and structural evidences", "3D image analysis", "Protein docking"], "correct": 1, "explanation": "It leverages miRNA seed matching to gain accuracy over general-purpose aligners."}, {"q": "A Von Neumann architecture uses:", "options": ["Distributed processing and memory in one place", "A CPU separate from a memory subsystem", "Only analog signals", "Only spikes"], "correct": 1, "explanation": "CPU and memory are separated by a bus, which creates the bottleneck."}, {"q": "Which is characteristic of spiking neural networks?", "options": ["Real-valued dense activations", "Discrete asynchronous spikes over time", "Instant sigmoid outputs", "No temporal component"], "correct": 1, "explanation": "SNNs propagate information as timed spikes, third-generation neurons."}, {"q": "Neuromorphic sensors like the silicon retina output:", "options": ["Video frames", "Events triggered by intensity changes at each pixel", "MFCC vectors", "Bounding boxes"], "correct": 1, "explanation": "They are event-based, producing spikes only on brightness changes."}, {"q": "Bioinformatics deep learning is challenging mainly because:", "options": ["Sequences are always short", "Data is high-dimensional with few labeled samples", "There are no computational tools", "Sequences do not vary between species"], "correct": 1, "explanation": "Labeled biological data is scarce and features are numerous."}, {"q": "One reason to prefer neuromorphic computing on a drone:", "options": ["More parallel general-purpose compute", "Sparse event-driven processing gives low latency and low power for reactive tasks", "Larger memory bandwidth", "Better floating-point precision"], "correct": 1, "explanation": "Neuromorphic hardware is efficient for sparse, real-time reactions."}, {"q": "A superclass (meta-label) approach helps when:", "options": ["Fine classes are perfectly balanced", "Fine classes are rare and semantically related, so shared features help", "There is no domain knowledge", "Labels are noise-free"], "correct": 1, "explanation": "Grouping related classes shares evidence and reduces overfitting."}], "flashcards": [{"front": "Define bioinformatics.", "back": "Use of computational tools to analyze biological data such as DNA, RNA, and protein sequences."}, {"front": "Give one role of miRNA.", "back": "Downregulate gene expression by binding to complementary mRNA sequences."}, {"front": "Why collapse recurring reads before alignment?", "back": "Redundant reads inflate compute and memory without adding information."}, {"front": "Name the four DNA nucleotides.", "back": "Adenine, Cytosine, Guanine, Thymine."}, {"front": "What replaces thymine in RNA?", "back": "Uracil."}, {"front": "Why is RNA folding important?", "back": "Secondary structure often dictates function, especially for regulatory RNAs."}, {"front": "What is the Von Neumann bottleneck?", "back": "Latency and energy cost of transferring data between separated CPU and memory."}, {"front": "Give one difference between ANN and SNN.", "back": "ANNs use continuous activations; SNNs use discrete spikes with temporal dynamics."}, {"front": "Which sensor is analogous to a silicon retina?", "back": "The human eye's retina, producing sparse events on brightness changes."}, {"front": "Why is Address Event Representation efficient?", "back": "It only transmits identifiers of active neurons, exploiting sparsity."}, {"front": "What did Carver Mead contribute to neuromorphic engineering?", "back": "He coined the term and pioneered analog VLSI circuits mimicking biological neurons."}, {"front": "Give a downstream benefit of alignment tool reliability.", "back": "Trustworthy miRNA expression levels for biomarker discovery."}, {"front": "Why is LaRA2 useful for RNA structure alignment?", "back": "It handles both sequence and structural constraints via combinatorial optimization."}, {"front": "One motivation for brain-inspired computing on drones.", "back": "Biological brains handle real-time control tasks efficiently on tiny power budgets."}, {"front": "Purpose of a meta-label approach in deep learning?", "back": "Group related classes to increase per-group data and share features."}], "short_answer": [{"prompt": "Explain why generic alignment tools underperform on miRNA data and how isomiR-SEA fixes this.", "sample_answer": "Generic aligners treat miRNA reads like any short sequence, missing that binding specificity centers on a short seed region and that the surrounding bases can carry isoform variability. isomiR-SEA first locates the seed match, then extends without gaps under strict rules to identify isoforms. It also discards reads inconsistent with miRNA structure early, saving compute. The result is more accurate quantification of miRNA expression levels for downstream biomarker analysis."}, {"prompt": "Contrast Von Neumann and neuromorphic architectures.", "sample_answer": "Von Neumann architectures split logic and memory, running synchronous binary programs with high precision at the cost of energy-hungry data movement. Neuromorphic architectures colocate processing and memory in neuron-like units that communicate via asynchronous spikes, encoding information in space and time. They are efficient for sparse, event-driven workloads such as sensory processing. Trade-off: they are harder to program and less general than a CPU."}, {"prompt": "Give one example of using deep learning for RNA analysis.", "sample_answer": "A CNN or Transformer takes short RNA sequences as input and learns to classify them by biological function such as miRNA versus long non-coding RNA. A meta-label groups related biotypes so features learned for one benefit another. The model is trained on curated databases and validated on hold-out sequences. Compared to hand-crafted alignment features, deep learning captures long-range and structural patterns implicitly."}, {"prompt": "What makes scaling ML methods to sequencing data hard in practice?", "sample_answer": "Sequencing produces tens of millions of reads per sample, so alignment and feature extraction must respect strict memory limits. Labels for training deep models are scarce and biased toward well-studied species. Class imbalance and technical batch effects can dominate the signal. Practical pipelines chain efficient C++ tools for preprocessing with deep learning models trained on curated subsets."}, {"prompt": "Explain the appeal of neuromorphic sensors for autonomous systems.", "sample_answer": "Event-based sensors output spikes only when the scene changes, giving microsecond latency and sparse data streams. Downstream neuromorphic processors act on those events in real time with milliwatt power budgets. This suits robotics and drones that need reactive control without a heavy compute budget. Standard cameras produce redundant frames that must be processed synchronously, wasting energy and time."}], "pitfalls": ["Applying generic alignment tools to miRNA and treating the results as ground truth.", "Ignoring memory limits when scaling sequencing pipelines.", "Confusing SNNs with binary ANNs; SNNs have temporal dynamics.", "Assuming neuromorphic hardware is a drop-in accelerator for standard deep learning.", "Overlooking domain-specific features (seeds, structure) when applying DL to sequences."]}, {"id": 12, "title": "Neuromorphic Computing", "overview": "Traces the history of neuromorphic computing from Lapicque and Hodgkin-Huxley to modern hardware, and formalizes the difference between first-, second-, and third-generation neural networks. Presents core spiking neuron models (LIF, Izhikevich, Hodgkin-Huxley) and local learning rules such as STDP, motivating deployment on neuromorphic chips.", "concepts": [{"term": "First-generation NN", "definition": "McCulloch-Pitts perceptron; binary output from a threshold on weighted inputs."}, {"term": "Second-generation NN", "definition": "Neurons apply a continuous non-linear activation (sigmoid, ReLU) to a weighted sum; the basis of modern deep learning."}, {"term": "Third-generation NN", "definition": "Spiking neurons whose inputs and outputs are timed spike trains, described by differential equations."}, {"term": "Action potential", "definition": "Discrete voltage spike generated when a biological neuron's membrane potential crosses threshold."}, {"term": "Membrane potential", "definition": "Voltage across a neuron's membrane; evolves due to ion currents and drives firing."}, {"term": "Refractory period", "definition": "Interval after a spike during which the neuron cannot easily fire again."}, {"term": "Leaky Integrate-and-Fire (LIF)", "definition": "Integrates input current with an exponential leak; emits a spike and resets when V crosses threshold."}, {"term": "Izhikevich neuron", "definition": "Two-variable model with quadratic dynamics that produces many biological spiking patterns at low cost (~13 FLOPS/ms)."}, {"term": "Hodgkin-Huxley model", "definition": "Biologically detailed model using ionic conductances (Na+, K+, leak); accurate but ~1200 FLOPS/ms."}, {"term": "Synapse", "definition": "Connection between neurons that transmits and weighs signals; can be chemical or electrical."}, {"term": "STDP", "definition": "Spike-Timing-Dependent Plasticity; local Hebbian rule adjusting weights based on relative pre/post spike timing."}, {"term": "Hebbian learning", "definition": "'Neurons that fire together wire together'; weight increases when pre- and post-synaptic activity coincide."}, {"term": "Local learning rule", "definition": "Update depending only on quantities available at the synapse, avoiding a global error signal."}, {"term": "Neuromorphic chip", "definition": "Custom hardware implementing spiking neurons and synapses in silicon, e.g., Loihi, TrueNorth, SpiNNaker."}], "formulas": [{"name": "LIF membrane dynamics", "latex": "\\tau_m \\frac{dV}{dt} = -(V - V_{rest}) + R I(t)", "note": "Leaky integration of input current with time constant tau_m."}, {"name": "LIF spike-and-reset", "latex": "\\text{if } V(t) \\ge V_{th}: \\text{emit spike}, \\; V \\leftarrow V_{reset}", "note": "Discrete reset rule following a spike."}, {"name": "Izhikevich model", "latex": "\\dot V = 0.04 V^2 + 5 V + 140 - U + I;\\; \\dot U = a(bV - U)", "note": "Two coupled ODEs; reset when V exceeds apex value."}, {"name": "STDP weight update", "latex": "\\Delta w = \\begin{cases} A_+ e^{-\\Delta t / \\tau_+} & \\Delta t > 0 \\\\ -A_- e^{\\Delta t / \\tau_-} & \\Delta t < 0 \\end{cases}", "note": "Positive if pre-fires before post, negative otherwise."}], "mcqs": [{"q": "Which best matches a third-generation neural network?", "options": ["Perceptron with threshold output", "MLP with ReLU", "SNN with spike-based communication and dynamical neurons", "Support Vector Machine"], "correct": 2, "explanation": "Third generation uses spiking neurons with temporal dynamics."}, {"q": "The Leaky Integrate-and-Fire model:", "options": ["Reproduces Hodgkin-Huxley dynamics exactly", "Integrates input current with an exponential leak and emits a spike at threshold", "Requires no reset", "Is a static classifier"], "correct": 1, "explanation": "LIF is a simple ODE with spike-and-reset semantics."}, {"q": "Compared to Hodgkin-Huxley, the Izhikevich model:", "options": ["Is more biologically detailed", "Achieves similar biological plausibility at a fraction of the FLOPS", "Cannot spike", "Uses only linear terms"], "correct": 1, "explanation": "~13 FLOPS/ms versus ~1200 while capturing many spiking patterns."}, {"q": "STDP updates a weight based on:", "options": ["Global gradient", "The relative timing of pre- and post-synaptic spikes", "Random noise", "Temperature"], "correct": 1, "explanation": "STDP is a local timing-based Hebbian rule."}, {"q": "Refractory period ensures:", "options": ["Neurons fire continuously", "A neuron cannot fire again immediately after a spike", "Input current is amplified", "Weights are reset"], "correct": 1, "explanation": "The membrane needs to reset before firing again."}, {"q": "Chemical vs electrical synapses differ mainly in:", "options": ["Speed and amplification: chemical is slower and amplifies; electrical is fast and direct", "The alphabet used", "The neurotransmitter released by electrical synapses", "Their location in the axon"], "correct": 0, "explanation": "Chemical synapses are slower with amplification via neurotransmitters; electrical gap junctions are near-instant."}, {"q": "Which is NOT a spiking neuron model?", "options": ["Hodgkin-Huxley", "Izhikevich", "Leaky Integrate-and-Fire", "Sigmoid perceptron"], "correct": 3, "explanation": "The sigmoid perceptron is a second-generation continuous unit, not a spiking model."}, {"q": "A locality-in-time learning rule is preferred on neuromorphic hardware because:", "options": ["It requires global synchronization", "Only local information at the synapse is needed, matching event-driven hardware", "It uses backpropagation", "It stores weights off-chip"], "correct": 1, "explanation": "Local rules match distributed asynchronous compute without backprop."}, {"q": "SpiNNaker and Loihi are examples of:", "options": ["GPUs", "Neuromorphic chips implementing spiking neurons in silicon", "Bioreactor components", "Optical sensors only"], "correct": 1, "explanation": "Both are dedicated neuromorphic platforms."}, {"q": "SNNs are attractive because:", "options": ["They are always more accurate than CNNs", "They can be extremely energy-efficient on event-driven inputs", "They eliminate the need for a loss function", "They train faster than MLPs on GPUs"], "correct": 1, "explanation": "Sparse events and event-driven compute lead to very low power consumption."}], "flashcards": [{"front": "Three generations of neural networks?", "back": "1) Perceptrons; 2) Continuous-activation neurons; 3) Spiking neurons."}, {"front": "State the LIF equation.", "back": "tau_m * dV/dt = -(V - V_rest) + R * I(t); spike and reset when V hits threshold."}, {"front": "Why is Hodgkin-Huxley expensive?", "back": "Four coupled ODEs with exponential ion channel dynamics: ~1200 FLOPS per 1 ms."}, {"front": "One reason to prefer Izhikevich over LIF?", "back": "Richer spiking patterns (bursting, chattering) at low cost."}, {"front": "What triggers an action potential in a biological neuron?", "back": "Membrane potential crossing a firing threshold."}, {"front": "STDP rule in one line?", "back": "Strengthen synapse if pre-spike precedes post-spike, weaken if post precedes pre."}, {"front": "Why does STDP fit neuromorphic hardware?", "back": "It only uses information available locally at the synapse."}, {"front": "Give a hardware example of a neuromorphic chip.", "back": "Loihi (Intel), TrueNorth (IBM), SpiNNaker."}, {"front": "Explain what a spike train encodes.", "back": "Information via timing and frequency of discrete events over time."}, {"front": "What is the refractory period good for?", "back": "It prevents runaway firing and controls the maximum firing rate."}, {"front": "Difference between chemical and electrical synapses?", "back": "Chemical use neurotransmitters and are slower but amplify; electrical are direct and fast via gap junctions."}, {"front": "What is Hebbian learning?", "back": "Coactive neurons strengthen their synapse: 'fire together, wire together'."}, {"front": "Why do SNNs suit event-driven sensors?", "back": "Both generate sparse timed events, matching data representation naturally."}, {"front": "What is Address Event Representation?", "back": "Encoding scheme transmitting spikes as identifiers of firing units."}, {"front": "One challenge of training SNNs?", "back": "Spike functions are non-differentiable, so surrogate gradients are needed."}], "short_answer": [{"prompt": "Explain the trade-off between Hodgkin-Huxley and LIF neurons.", "sample_answer": "Hodgkin-Huxley describes ion currents through Na+, K+, and leak channels with four coupled ODEs, giving very accurate biological behavior. That accuracy costs about 1200 floating-point operations per millisecond of simulation, prohibitive at scale. LIF simplifies to a single leaky integrator with a spike-and-reset rule and only a handful of operations per step. Applied research picks LIF when scale and hardware efficiency dominate, HH when biophysical fidelity matters."}, {"prompt": "Describe STDP and why it fits neuromorphic hardware.", "sample_answer": "STDP is a Hebbian rule where synaptic weight changes depend on the time difference between pre- and post-synaptic spikes. If the presynaptic spike precedes the postsynaptic one, the weight increases; if it follows, the weight decreases. The rule only uses information available at the synapse, so it can run in a distributed, asynchronous fashion. This matches neuromorphic chips that avoid a global controller and communicate via events."}, {"prompt": "Give the intuition of a spiking neuron and how it processes an input current.", "sample_answer": "A spiking neuron holds a membrane potential updated by input currents through a resistor-capacitor-like circuit. When the potential crosses a threshold, the neuron emits a spike and resets, entering a brief refractory window. Information is thus encoded in the timing and rate of spikes rather than in a continuous value. Downstream neurons integrate spikes from many sources with weighted synapses, replicating computation in an event-driven manner."}, {"prompt": "Why are SNNs attractive for edge AI?", "sample_answer": "SNNs communicate through sparse timed events, so most of the time no computation happens, saving energy. They pair naturally with event-based sensors that output only on change. Neuromorphic chips implement neurons and synapses in colocated silicon, avoiding the Von Neumann memory bottleneck. As a result, low-power, real-time inference becomes feasible on battery-powered devices."}, {"prompt": "Explain the difference between second- and third-generation neural networks.", "sample_answer": "Second-generation networks apply a smooth activation like ReLU or sigmoid to a weighted sum, yielding a continuous scalar per neuron and unit at each time step. Third-generation networks use spiking neurons whose state evolves according to differential equations and whose output is a stream of discrete spikes. The temporal dimension is intrinsic, so timing carries information. Third-generation networks require different training methods (surrogate gradients, STDP) and dedicated hardware to shine."}], "pitfalls": ["Treating an SNN as an ANN drop-in without accounting for temporal dynamics.", "Underestimating the computational cost of Hodgkin-Huxley simulations.", "Assuming backpropagation works out of the box on spike functions.", "Ignoring the refractory period, leading to unrealistic firing rates.", "Mixing continuous and event-driven representations without clean conversion."]}];
