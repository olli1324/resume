<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>MLIA — Study Platform</title>
<script>
  MathJax = {
    tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$', '$$'], ['\\[', '\\]']] },
    svg: { fontCache: 'global' }
  };
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" defer></script>
<style>
  :root {
    --bg: #0f1418;
    --bg-elev: #171d23;
    --bg-elev2: #1f272f;
    --border: #2b3541;
    --text: #e6edf3;
    --text-muted: #8b98a5;
    --accent: #f78166;         /* GitHub-style orange, gives the platform its own identity */
    --accent-soft: rgba(247, 129, 102, 0.15);
    --ok: #56d364;
    --err: #f85149;
    --warn: #f2cc60;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-size: 15px; line-height: 1.55; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }

  .app { display: grid; grid-template-columns: 260px 1fr; min-height: 100vh; }
  .sidebar { background: var(--bg-elev); border-right: 1px solid var(--border); padding: 20px 0; overflow-y: auto; position: sticky; top: 0; height: 100vh; }
  .sidebar .brand { padding: 0 20px 16px 20px; border-bottom: 1px solid var(--border); }
  .sidebar .brand .title { font-weight: 700; font-size: 15px; letter-spacing: 0.3px; }
  .sidebar .brand .subtitle { font-size: 12px; color: var(--text-muted); margin-top: 3px; }
  .sidebar nav { padding: 12px 0; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 8px 20px; cursor: pointer; color: var(--text-muted); font-size: 14px; border-left: 2px solid transparent; }
  .nav-item:hover { background: var(--bg-elev2); color: var(--text); }
  .nav-item.active { background: var(--bg-elev2); color: var(--text); border-left-color: var(--accent); }
  .nav-item .num { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 12px; color: var(--text-muted); min-width: 22px; }
  .nav-item.active .num { color: var(--accent); }
  .nav-item .progress { margin-left: auto; font-size: 11px; color: var(--text-muted); font-variant-numeric: tabular-nums; }

  .sidebar .actions { padding: 16px 20px; border-top: 1px solid var(--border); font-size: 13px; }
  .sidebar .actions button { background: none; border: 1px solid var(--border); color: var(--text-muted); padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; }
  .sidebar .actions button:hover { background: var(--bg-elev2); color: var(--text); }

  main { padding: 32px 44px; max-width: 960px; }
  main .lecture-header { display: flex; align-items: baseline; gap: 12px; margin-bottom: 6px; }
  main .lecture-header .num { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 13px; color: var(--accent); background: var(--accent-soft); padding: 2px 8px; border-radius: 4px; }
  main .lecture-header h1 { font-size: 26px; font-weight: 700; margin: 0; }
  main .overview { color: var(--text-muted); margin: 0 0 24px; font-size: 15px; }

  .tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--border); margin-bottom: 24px; }
  .tab { padding: 10px 16px; cursor: pointer; color: var(--text-muted); font-size: 14px; border-bottom: 2px solid transparent; margin-bottom: -1px; }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--text); border-bottom-color: var(--accent); }
  .tab .count { font-size: 12px; color: var(--text-muted); margin-left: 4px; }

  .panel { display: none; }
  .panel.active { display: block; }

  /* Concepts */
  .concept-list { display: grid; grid-template-columns: 1fr; gap: 8px; }
  .concept { background: var(--bg-elev); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; }
  .concept .term { font-weight: 600; margin-bottom: 4px; }
  .concept .def { color: var(--text-muted); font-size: 14px; }

  /* Formulas */
  .formula-list { display: grid; gap: 12px; }
  .formula { background: var(--bg-elev); border: 1px solid var(--border); border-radius: 8px; padding: 14px 18px; }
  .formula .name { font-weight: 600; margin-bottom: 6px; }
  .formula .latex { padding: 8px 0; overflow-x: auto; }
  .formula .note { color: var(--text-muted); font-size: 13px; margin-top: 4px; }

  /* Flashcards */
  .fc-controls { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; color: var(--text-muted); font-size: 13px; }
  .fc-controls .position { font-variant-numeric: tabular-nums; }
  .fc-controls .shuffle { background: none; border: 1px solid var(--border); color: var(--text-muted); padding: 5px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; }
  .fc-controls .shuffle:hover { color: var(--text); background: var(--bg-elev2); }

  .flashcard { perspective: 1200px; height: 220px; margin-bottom: 16px; }
  .flashcard-inner { position: relative; width: 100%; height: 100%; transform-style: preserve-3d; transition: transform 0.45s cubic-bezier(0.4, 0.0, 0.2, 1); cursor: pointer; }
  .flashcard.flipped .flashcard-inner { transform: rotateX(180deg); }
  .fc-side { position: absolute; inset: 0; backface-visibility: hidden; -webkit-backface-visibility: hidden; background: var(--bg-elev); border: 1px solid var(--border); border-radius: 12px; padding: 24px 30px; display: flex; align-items: center; justify-content: center; text-align: center; font-size: 18px; line-height: 1.5; }
  .fc-side.back { transform: rotateX(180deg); background: var(--bg-elev2); }
  .fc-side .hint { position: absolute; top: 10px; left: 14px; font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.8px; }
  .fc-nav { display: flex; gap: 8px; justify-content: center; }
  .fc-nav button { background: var(--bg-elev); border: 1px solid var(--border); color: var(--text); padding: 8px 22px; border-radius: 8px; cursor: pointer; font-size: 14px; }
  .fc-nav button:hover { background: var(--bg-elev2); border-color: var(--accent); }
  .fc-nav button.known { border-color: var(--ok); color: var(--ok); }
  .fc-nav button.review { border-color: var(--warn); color: var(--warn); }
  .fc-nav button:disabled { opacity: 0.4; cursor: default; }

  /* MCQ */
  .mcq { background: var(--bg-elev); border: 1px solid var(--border); border-radius: 10px; padding: 20px 24px; margin-bottom: 16px; }
  .mcq .q { font-weight: 500; margin-bottom: 14px; }
  .mcq .qnum { color: var(--text-muted); font-size: 13px; font-variant-numeric: tabular-nums; margin-right: 6px; }
  .mcq .options { display: grid; gap: 8px; }
  .mcq .opt { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 10px 14px; cursor: pointer; font-size: 14px; display: flex; align-items: flex-start; gap: 10px; }
  .mcq .opt:hover { border-color: var(--accent); }
  .mcq .opt .letter { font-family: ui-monospace, "SF Mono", Menlo, monospace; color: var(--text-muted); font-size: 12px; min-width: 14px; padding-top: 1px; }
  .mcq .opt.correct { border-color: var(--ok); background: rgba(86, 211, 100, 0.08); }
  .mcq .opt.wrong { border-color: var(--err); background: rgba(248, 81, 73, 0.08); }
  .mcq .opt.locked { cursor: default; }
  .mcq .opt.locked:hover { border-color: var(--border); }
  .mcq .opt.locked.correct:hover { border-color: var(--ok); }
  .mcq .opt.locked.wrong:hover { border-color: var(--err); }
  .mcq .explanation { display: none; margin-top: 12px; padding: 10px 14px; background: rgba(247, 129, 102, 0.06); border-left: 3px solid var(--accent); font-size: 13px; color: var(--text); border-radius: 4px; }
  .mcq.answered .explanation { display: block; }

  .mcq-summary { position: sticky; top: 12px; background: var(--bg-elev); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; font-size: 13px; margin-bottom: 16px; display: flex; align-items: center; gap: 16px; }
  .mcq-summary .score { font-weight: 600; }
  .mcq-summary .reset { margin-left: auto; background: none; border: 1px solid var(--border); color: var(--text-muted); padding: 5px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; }
  .mcq-summary .reset:hover { color: var(--text); background: var(--bg-elev2); }

  /* Short answers */
  .sa { background: var(--bg-elev); border: 1px solid var(--border); border-radius: 10px; padding: 20px 24px; margin-bottom: 14px; }
  .sa .prompt { font-weight: 500; margin-bottom: 12px; }
  .sa textarea { width: 100%; min-height: 90px; background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 10px 12px; font-family: inherit; font-size: 14px; resize: vertical; }
  .sa textarea:focus { outline: none; border-color: var(--accent); }
  .sa .reveal-btn { margin-top: 10px; background: none; border: 1px solid var(--border); color: var(--text-muted); padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; }
  .sa .reveal-btn:hover { color: var(--text); border-color: var(--accent); }
  .sa .answer { display: none; margin-top: 12px; padding: 12px 16px; background: var(--bg-elev2); border-radius: 6px; font-size: 14px; line-height: 1.6; }
  .sa.revealed .answer { display: block; }
  .sa.revealed .reveal-btn { display: none; }

  /* Pitfalls */
  .pitfalls { display: grid; gap: 8px; }
  .pitfall { display: flex; gap: 12px; padding: 12px 16px; background: var(--bg-elev); border: 1px solid var(--border); border-left: 3px solid var(--warn); border-radius: 6px; font-size: 14px; }
  .pitfall .icon { color: var(--warn); font-weight: 700; }

  /* misc */
  @media (max-width: 720px) {
    .app { grid-template-columns: 1fr; }
    .sidebar { position: static; height: auto; }
    main { padding: 24px 16px; }
  }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <div class="title">MLIA Study Platform</div>
      <div class="subtitle">Machine Learning in Applications · PoliTO</div>
    </div>
    <nav id="nav"></nav>
    <div class="actions">
      <button id="reset-progress">Reset all progress</button>
    </div>
  </aside>
  <main id="main"></main>
</div>

<script>
const LECTURES = [{"id": 1, "title": "Introduction", "overview": "Course overview covering what ML is, why it matters in applied settings, and how supervised, unsupervised, and reinforcement learning differ. The lecture also frames the applied-ML mindset: real datasets are messy, imbalanced, or unlabeled, and models must be picked with a specific task and constraint in mind.", "concepts": [{"term": "Artificial Intelligence", "definition": "Branch of computer science that builds agents capable of perceiving an environment and taking actions to maximize the chance of achieving a goal."}, {"term": "Machine Learning", "definition": "Subfield of AI where a system derives knowledge from experimental data rather than being explicitly programmed."}, {"term": "Supervised learning", "definition": "Learning a mapping from inputs to labels using a labeled training set, typically for classification or regression."}, {"term": "Unsupervised learning", "definition": "Learning structure from unlabeled data, for example clustering or dimensionality reduction."}, {"term": "Reinforcement learning", "definition": "Learning a policy from reward signals produced by interaction with an environment."}, {"term": "Classification", "definition": "Supervised task predicting a discrete class label for each input."}, {"term": "Regression", "definition": "Supervised task predicting a continuous outcome from predictor variables."}, {"term": "Decision boundary", "definition": "Surface in feature space that separates predicted classes learned by a classifier."}, {"term": "Clustering", "definition": "Unsupervised task that partitions samples into groups so that within-group similarity is high and between-group similarity is low."}, {"term": "Dimensionality reduction", "definition": "Mapping data from a high-dimensional space to a lower-dimensional one while preserving useful structure."}, {"term": "Anomaly detection", "definition": "Identifying data points that do not fit any of the discovered clusters or expected distribution."}, {"term": "Training set vs test set", "definition": "Training data is used to fit the model; test data is held out to estimate how well it generalizes."}, {"term": "Data-driven paradigm", "definition": "Instead of writing a program, provide data plus desired outputs and let the algorithm produce the program (the model)."}, {"term": "When learning is needed", "definition": "Use ML when human expertise is missing, unreliable, unfeasible to encode, or when solutions must adapt over time."}], "formulas": [{"name": "Linear regression objective", "latex": "\\hat{\\beta} = \\arg\\min_{\\beta} \\sum_{i=1}^{n} (y_i - \\beta^\\top x_i)^2", "note": "Fits a line by minimizing squared distance between samples and predictions."}], "mcqs": [{"q": "Which of the following best distinguishes machine learning from traditional programming?", "options": ["Traditional programming derives outputs from a program and data; ML derives the program from data and outputs", "ML always requires labeled data while traditional programs do not", "ML is faster than any hand-written program", "Traditional programming only handles numeric data"], "correct": 0, "explanation": "ML flips the paradigm: the algorithm consumes data and target outputs and produces the mapping."}, {"q": "Which task is unsupervised?", "options": ["Predicting house prices from features", "Diagnosing disease from labeled scans", "Grouping customers with unknown segments", "Classifying emails as spam or not"], "correct": 2, "explanation": "Grouping without predefined labels is clustering, a canonical unsupervised task."}, {"q": "In linear regression, the parameters are fit by minimizing which quantity?", "options": ["Sum of absolute residuals", "Number of misclassified points", "Sum of squared residuals", "Entropy of the residuals"], "correct": 2, "explanation": "Ordinary least squares minimizes the sum of squared residuals."}, {"q": "Why is learning preferred over hand-coded rules for many modern problems?", "options": ["Rules are always incorrect", "Data are cheap while expert-encoded rules are expensive and brittle", "ML never overfits", "Rules require GPUs"], "correct": 1, "explanation": "Human expertise is scarce and hard to formalize while data is abundant."}, {"q": "Which application is most naturally framed as anomaly detection?", "options": ["Flagging unusual credit card transactions", "Predicting apartment rent", "Translating text to French", "Training a chatbot to reply politely"], "correct": 0, "explanation": "Anomalies are rare events that do not conform to the learned normal cluster structure."}, {"q": "Which pair correctly matches a supervised learning task to its output type?", "options": ["Classification to continuous output", "Regression to discrete output", "Classification to discrete output", "Reinforcement learning to fixed labels"], "correct": 2, "explanation": "Classification produces discrete class labels; regression produces continuous outputs."}, {"q": "Which statement about decision boundaries is correct?", "options": ["They only exist for linear classifiers", "They divide the input space into decision regions", "They are only defined for regression models", "They correspond to unlabeled training examples"], "correct": 1, "explanation": "Any classifier induces regions of the input space separated by a boundary."}, {"q": "Which type of learning would you use to train a robot to navigate a maze with only a reward signal?", "options": ["Supervised learning", "Reinforcement learning", "Semi-supervised learning", "Unsupervised learning"], "correct": 1, "explanation": "Reinforcement learning optimizes actions from rewards, no labels required."}, {"q": "Why is dimensionality reduction useful for visualization?", "options": ["It removes noise from images automatically", "It projects data to 2D or 3D so humans can inspect structure", "It always improves classification accuracy", "It replaces feature scaling"], "correct": 1, "explanation": "The main visualization use case is projecting to two or three dimensions."}, {"q": "Which of the following is a challenge specifically stressed in this course?", "options": ["Datasets always come cleanly labeled", "Real-world data is often imbalanced, noisy, or unlabeled", "Computational resources are unbounded", "Domain knowledge is never useful"], "correct": 1, "explanation": "The course emphasizes applied issues such as noise, imbalance, and missing labels."}], "flashcards": [{"front": "Give a one-line definition of machine learning.", "back": "A computer's ability to learn a solution to a problem from data instead of explicit programming."}, {"front": "Two flavors of supervised learning?", "back": "Classification (discrete labels) and regression (continuous outcomes)."}, {"front": "When would you pick unsupervised over supervised methods?", "back": "When labels are unavailable, unreliable, or you want to discover structure."}, {"front": "What separates reinforcement learning from supervised learning?", "back": "RL learns from reward signals given by environment interaction, not from labeled examples."}, {"front": "Give one concrete case where an ML approach is preferable to hand-coded rules.", "back": "Tasks where human expertise cannot be verbalized, for example speech recognition."}, {"front": "What is a decision boundary?", "back": "The surface in feature space that separates predicted classes."}, {"front": "How is anomaly detection linked to clustering?", "back": "Points that do not fit any cluster can be flagged as anomalies."}, {"front": "What does the linear regression fit line minimize?", "back": "The mean squared distance between the samples and the line."}, {"front": "Why is data considered cheap relative to expertise?", "back": "Sensors and logs generate volumes of data continuously, while domain experts are rare and slow."}, {"front": "Name three areas where ML now outperforms hand-crafted approaches.", "back": "Speech recognition, computer vision, natural language processing."}, {"front": "Why do we split data into training and test sets?", "back": "To measure how well the model generalizes to unseen data instead of memorizing training samples."}, {"front": "Two typical unsupervised tasks?", "back": "Clustering and dimensionality reduction."}, {"front": "What is the pipeline of a supervised system in one sentence?", "back": "Learn from labeled data, evaluate on held-out labeled data, deploy if performance is acceptable."}, {"front": "State the classic clustering objective in words.", "back": "Maximize within-cluster similarity while minimizing between-cluster similarity."}, {"front": "How does the ML paradigm invert traditional programming?", "back": "Instead of writing a program that produces output, we present data and desired output, and the ML algorithm produces the program."}], "short_answer": [{"prompt": "Contrast the workflow of supervised and unsupervised learning in 3-4 sentences.", "sample_answer": "Supervised learning uses input-output pairs to train a model, then evaluates it on held-out labeled data, and finally deploys the model to predict labels for new inputs. Unsupervised learning starts from unlabeled data and builds an algorithm that itself creates a structure such as clusters or a low-dimensional embedding. There is no ground truth to score predictions directly, so evaluation relies on intrinsic measures or downstream tasks. Practically, supervised learning is preferred when labels are trustworthy and available; unsupervised learning is used to explore data or when labeling is unfeasible."}, {"prompt": "Explain in 3-4 sentences why applied ML is often harder than benchmark ML.", "sample_answer": "Public benchmarks give clean, well-scaled, balanced data with reliable labels, so the challenge is mostly algorithmic. Applied ML must handle noisy, imbalanced, or partially labeled data drawn from constrained sensors or expensive human annotation. On top of that, computational budgets and end-user constraints limit which models are feasible. Success depends as much on data curation, feature design, and evaluation setup as on the model itself."}, {"prompt": "Describe when linear regression is appropriate and one situation where it will fail.", "sample_answer": "Linear regression is appropriate when the outcome is roughly a linear function of the predictors and the noise is well-behaved. It gives interpretable coefficients and closed-form solutions. It fails when the relationship is strongly non-linear, when features interact multiplicatively, or when outliers dominate the squared loss. In those cases, non-linear models or robust losses give better fits."}, {"prompt": "Give an applied example where anomaly detection is preferable to standard classification.", "sample_answer": "In quality monitoring on a production line, defective items are extremely rare, so training a supervised classifier for defects is impractical. Instead, we cluster or model the density of normal samples and flag points that do not fit any cluster as anomalies. This does not require labeled defect examples and adapts as normal patterns drift over time."}, {"prompt": "Explain the change of paradigm from traditional programming to ML in 3-4 sentences.", "sample_answer": "In traditional programming, the developer writes explicit rules that transform inputs into outputs. In ML, the developer provides examples of input-output pairs and lets a learning algorithm find the rules that best explain them. This shifts the difficulty from programming logic to designing data, features, and objectives. It is useful precisely when we cannot express the desired behavior as neat code."}], "pitfalls": ["Treating ML as a silver bullet even when a simple hand-coded rule would work.", "Ignoring the distinction between training and test performance when reporting results.", "Assuming public benchmarks generalize to real applied datasets.", "Conflating classification with regression when the target is actually continuous.", "Skipping exploratory analysis before choosing supervised vs unsupervised methods."]}, {"id": 2, "title": "Feature Reduction", "overview": "Covers why reducing the number of features helps machine learning, and the two families that do it: dimensionality reduction (PCA, LDA, kernel variants, Isomap, LLE, t-SNE) and feature selection (filter and wrapper methods with heuristic search). It also frames the tradeoffs, since reduction can drop information while helping generalization, speed, and interpretability.", "concepts": [{"term": "Curse of dimensionality", "definition": "As dimension grows, distances become uninformative and estimation accuracy degrades sharply."}, {"term": "Feature selection", "definition": "Picking a subset of the original features, preserving their meaning and units."}, {"term": "Dimensionality reduction", "definition": "Building new features from linear or non-linear combinations of the originals."}, {"term": "Principal Component Analysis", "definition": "Unsupervised linear projection that maximizes variance along orthogonal principal components derived from the covariance matrix."}, {"term": "Linear Discriminant Analysis", "definition": "Supervised linear projection that maximizes inter-class distance and minimizes intra-class variance."}, {"term": "Kernel PCA", "definition": "PCA applied after mapping data to a high-dimensional feature space via a kernel, enabling non-linear projections."}, {"term": "Manifold learning", "definition": "Family of methods assuming high-dimensional data lies on a lower-dimensional non-linear manifold that can be unfolded."}, {"term": "Isomap", "definition": "Uses geodesic distances on a neighborhood graph to preserve global manifold structure in a low-dimensional embedding."}, {"term": "Locally Linear Embedding", "definition": "Reconstructs each point as a weighted linear combination of its neighbors, then embeds those weights in a low-dimensional space."}, {"term": "t-SNE", "definition": "Non-linear embedding that preserves local pairwise similarities via Gaussian in high dim and t-distribution in low dim."}, {"term": "Filter method", "definition": "Feature selection using a criterion independent of the classifier such as mutual information or interclass distance."}, {"term": "Wrapper method", "definition": "Feature selection that scores subsets by the accuracy of a specific classifier trained on them."}, {"term": "Sequential forward selection", "definition": "Greedy heuristic adding one feature at a time to the subset that maximizes accuracy."}, {"term": "Genetic algorithm", "definition": "Randomized search that evolves a population of feature-subset chromosomes via selection, crossover, and mutation."}], "formulas": [{"name": "Covariance", "latex": "\\mathrm{cov}(X,Y) = \\frac{1}{n-1} \\sum_{i=1}^{n} (X_i - \\bar{X})(Y_i - \\bar{Y})", "note": "Basis of the PCA covariance matrix."}, {"name": "PCA eigenproblem", "latex": "C v = \\lambda v", "note": "Principal directions are eigenvectors of the covariance matrix; eigenvalues give variance captured."}, {"name": "Explained variance ratio", "latex": "\\text{ratio}_j = \\lambda_j / \\sum_k \\lambda_k", "note": "Fraction of variance captured by the j-th principal component."}, {"name": "t-SNE similarity", "latex": "p_{j|i} = \\frac{\\exp(-\\|x_i - x_j\\|^2 / 2\\sigma_i^2)}{\\sum_{k \\ne i} \\exp(-\\|x_i - x_k\\|^2 / 2\\sigma_i^2)}", "note": "Conditional probability that xi picks xj as a neighbor."}, {"name": "GA fitness for feature selection", "latex": "F = w_1 \\cdot \\text{accuracy} + w_2 \\cdot \\text{zeros}", "note": "Rewards accurate small subsets, with w1 much larger than w2."}], "mcqs": [{"q": "Which of the following is NOT a valid motivation for feature reduction?", "options": ["Fighting the curse of dimensionality", "Reducing storage and computation", "Guaranteeing higher accuracy on every dataset", "Enabling 2D/3D visualization"], "correct": 2, "explanation": "Reduction can help but never guarantees higher accuracy."}, {"q": "PCA principal components are the eigenvectors of which matrix?", "options": ["Data matrix X", "Gram matrix of the labels", "Covariance matrix of X", "Confusion matrix"], "correct": 2, "explanation": "PCA diagonalizes the sample covariance matrix."}, {"q": "Which method uses class labels to find its projection?", "options": ["PCA", "LDA", "LLE", "t-SNE"], "correct": 1, "explanation": "LDA is supervised: it uses classes to maximize between-class distance and minimize within-class variance."}, {"q": "Why does t-SNE outperform PCA on complex non-linear data?", "options": ["It uses labels", "It preserves pairwise similarity via probabilities in low dim", "It solves a closed-form eigenproblem", "It always keeps global distances"], "correct": 1, "explanation": "t-SNE keeps local neighborhood structure and can uncover clusters where PCA cannot."}, {"q": "Which is a filter feature selection method?", "options": ["Wrapping SVM accuracy for each subset", "Ranking features by mutual information with the label", "Genetic algorithm with classifier fitness", "Sequential forward selection with accuracy as criterion"], "correct": 1, "explanation": "Filter methods use classifier-independent statistical criteria."}, {"q": "Main limitation of sequential forward selection (SFS)?", "options": ["It always finds the optimum", "It cannot remove features that become redundant later", "It requires a kernel", "It only works for regression"], "correct": 1, "explanation": "SFS is greedy and never re-evaluates included features."}, {"q": "Isomap improves over PCA on non-linear manifolds because it uses:", "options": ["Random projections", "Class information", "Geodesic distances estimated on a neighborhood graph", "Fisher information"], "correct": 2, "explanation": "It approximates the manifold distance via the graph, not the straight-line Euclidean distance."}, {"q": "Which statement about LDA is true?", "options": ["It is unsupervised", "It maximizes intra-class variance", "It projects to at most C-1 dimensions where C is number of classes", "It requires kernel evaluation"], "correct": 2, "explanation": "LDA can produce at most C-1 discriminative components for C classes."}, {"q": "The kernel trick lets us:", "options": ["Compute non-linear PCA in feature space using only dot products in input space", "Avoid the need for training data", "Guarantee linear separability in the original space", "Replace SGD"], "correct": 0, "explanation": "It rewrites algorithms in terms of kernel evaluations, avoiding the explicit high-dimensional mapping."}, {"q": "In a GA-based feature selection, mutation primarily serves to:", "options": ["Force convergence", "Explore new regions of the search space by flipping bits", "Compute fitness", "Replace crossover entirely"], "correct": 1, "explanation": "Mutation introduces variation and protects against permanent loss of good features."}], "flashcards": [{"front": "When would you pick feature selection over PCA?", "back": "When interpretability of original features and units is required, or when only a few need to be measured at inference."}, {"front": "When would you pick PCA over t-SNE?", "back": "When you want fast, deterministic global structure or when downstream models need a linear projection with clear variance interpretation."}, {"front": "What does the first principal component point at?", "back": "The direction of largest variance in the data cloud."}, {"front": "How do you decide the number of PCA components to keep?", "back": "Retain enough components to reach a variance threshold, or use the elbow of the scree plot."}, {"front": "Give the intuition of LDA in one line.", "back": "Project so that class centers are far apart and within-class spread is small."}, {"front": "Why do filter methods sometimes select overly large subsets?", "back": "Their objective is often monotonic so more features always look at least as good, requiring an arbitrary cutoff."}, {"front": "Why is exhaustive feature selection usually infeasible?", "back": "The number of subsets grows combinatorially with the number of features."}, {"front": "What weakness does SFFS fix in SFS?", "back": "SFFS also performs backward steps after each addition so it can remove features that become redundant."}, {"front": "State one situation where PCA fails badly.", "back": "Data lying on a non-linear manifold such as a swiss roll, since PCA sees only Euclidean directions."}, {"front": "What is the reparameterization behind kernel PCA?", "back": "Solve PCA in feature space by computing kernel entries K(xi, xj) instead of explicit projections."}, {"front": "What are the three genetic operators?", "back": "Selection, crossover, mutation."}, {"front": "Why is t-SNE risky for interpretation?", "back": "It preserves local structure but distorts global distances, and cluster sizes are not meaningful."}, {"front": "Wrapper vs filter execution time?", "back": "Wrappers train a classifier per subset (slow); filters compute statistics once (fast)."}, {"front": "What is a covariance matrix used for in PCA?", "back": "It encodes how features co-vary; its eigenvectors define orthogonal principal directions."}, {"front": "Explain the sign of covariance.", "back": "Positive means variables move together, negative means opposite direction, zero means independent (linearly)."}, {"front": "What are eigenvalues in PCA?", "back": "Variance captured by each principal component."}, {"front": "How does LLE work in one line?", "back": "Reconstruct each point from its neighbors, then find a low-dimensional embedding that preserves those reconstruction weights."}], "short_answer": [{"prompt": "Explain why applying PCA before clustering can either help or hurt, in 3-4 sentences.", "sample_answer": "PCA can help by removing noisy or redundant dimensions where distances are meaningless, which sharpens clusters. However, PCA maximizes variance rather than class separability, so cluster-relevant directions with low variance may be discarded. If clusters lie along non-linear manifolds, PCA can also flatten them together. As a rule, PCA is a useful preprocessor when the data is roughly Gaussian and clusters have high-variance separation."}, {"prompt": "Contrast wrapper and filter feature selection in an applied setting.", "sample_answer": "Filter methods score features using cheap statistical criteria such as mutual information, so they scale to thousands of features and give classifier-agnostic results. Wrapper methods evaluate subsets by training a specific model on each, capturing feature interactions but at high computational cost. In applied settings with expensive labels or many features, filters are useful for a first pass and wrappers for a tighter search on a smaller pool. The two are often combined into a hybrid pipeline."}, {"prompt": "Explain the difference between PCA and LDA and when you would prefer LDA.", "sample_answer": "PCA is unsupervised and picks directions of maximal variance regardless of class. LDA uses class labels to maximize the ratio of between-class scatter to within-class scatter. LDA is preferable when the goal is downstream classification and class separation matters more than variance. It gives at most C-1 useful dimensions for C classes, so it may be too restrictive when there are only two classes."}, {"prompt": "Describe how t-SNE differs from Isomap and LLE.", "sample_answer": "Isomap and LLE are best at unfolding a single continuous manifold; Isomap preserves geodesic distances via a neighborhood graph, and LLE preserves local linear reconstructions. t-SNE turns pairwise distances into probability distributions and matches them in low dimension, giving strong local cluster structure. t-SNE handles many disjoint clusters better but is stochastic, expensive, and distorts global geometry. For interpretability of clusters use t-SNE; for a single smooth manifold use Isomap or LLE."}, {"prompt": "Explain how a genetic algorithm searches the feature-subset space.", "sample_answer": "A GA encodes each feature subset as a binary chromosome and evaluates it with a fitness function that combines classification accuracy and subset size. It iteratively selects high-fitness parents, produces offspring by crossover, and applies mutation to keep diversity. Elitism carries the best solutions unchanged into the next generation. Over many generations the population converges toward compact, high-accuracy feature subsets."}], "pitfalls": ["Forgetting to center and scale features before PCA.", "Interpreting cluster sizes or global distances in a t-SNE plot as meaningful.", "Using wrapper methods on tiny datasets without cross-validation, causing severe overfitting.", "Assuming a linear method like PCA will work on a highly non-linear manifold.", "Reporting selected features from a filter without checking classifier-level accuracy."]}, {"id": 3, "title": "Clustering", "overview": "Introduces partitional (k-means, k-medians), hierarchical (agglomerative with MIN/MAX/average linkage), and density-based methods (DBSCAN, mean shift), plus how to pick k and validate clusters. It also frames intrinsic validation (SSE, silhouette) versus external and relative measures, and the practical trade-offs between the algorithms.", "concepts": [{"term": "Partitional clustering", "definition": "Iteratively assigns points to a fixed number of disjoint clusters, for example k-means."}, {"term": "Hierarchical clustering", "definition": "Builds a nested tree of clusters through agglomerative merges or divisive splits."}, {"term": "Density-based clustering", "definition": "Groups regions of high point density and treats sparse points as noise, for example DBSCAN or mean shift."}, {"term": "k-means", "definition": "Alternates between assigning each point to its nearest centroid and recomputing centroids to minimize within-cluster SSE."}, {"term": "SSE", "definition": "Sum of squared distances from each point to its assigned cluster centroid, the objective k-means minimizes."}, {"term": "Elbow method", "definition": "Plot SSE against k and choose k where the curve bends sharply."}, {"term": "Dendrogram", "definition": "Tree diagram recording the sequence of merges or splits in hierarchical clustering."}, {"term": "Linkage", "definition": "Rule defining distance between clusters: single (MIN), complete (MAX), average, centroid."}, {"term": "DBSCAN", "definition": "Density-based method that labels points as core, border, or noise using neighborhood radius Eps and minimum count MinPts."}, {"term": "Core, border, noise points", "definition": "In DBSCAN, core points have at least MinPts neighbors within Eps, border points are neighbors of core points, noise points are neither."}, {"term": "Mean shift", "definition": "Iteratively shifts a density estimation window toward the local density maximum; points converging to the same mode share a cluster."}, {"term": "Silhouette coefficient", "definition": "Combines cohesion (a) and separation (b) into 1 - a/b when a < b, indicating cluster quality per point."}, {"term": "Internal vs external validation", "definition": "Internal uses only the data (SSE, silhouette); external compares clusters to ground truth labels."}, {"term": "Cohesion vs separation", "definition": "Cohesion measures within-cluster tightness (WSS); separation measures between-cluster distance (BSS)."}], "formulas": [{"name": "k-means centroid update", "latex": "m_k = \\frac{1}{N_k} \\sum_{i \\in C(k)} x_i", "note": "Mean of points assigned to cluster k."}, {"name": "k-means assignment", "latex": "C(i) = \\arg\\min_{1 \\le k \\le K} \\|x_i - m_k\\|^2", "note": "Assign each point to the nearest centroid."}, {"name": "Within-cluster sum of squares", "latex": "\\text{WSS} = \\sum_i \\sum_{x \\in C_i} (x - c_i)^2", "note": "Cohesion measure used as k-means objective."}, {"name": "Between-cluster sum of squares", "latex": "\\text{BSS} = \\sum_i m_i (c_i - c)^2", "note": "Separation measure; c is the overall mean."}, {"name": "Silhouette", "latex": "s = 1 - a/b \\text{ if } a < b, \\text{ else } b/a - 1", "note": "a is avg dist to own cluster, b is min avg dist to another cluster."}], "mcqs": [{"q": "Which is a known weakness of k-means?", "options": ["Always finds the global optimum", "Requires no distance function", "Depends on initialization and can converge to poor local minima", "Ignores centroid updates"], "correct": 2, "explanation": "k-means is sensitive to initial centroid placement, so multiple restarts are common."}, {"q": "In DBSCAN, a point is a core point when:", "options": ["It has at least MinPts neighbors within Eps", "It is the mean of the cluster", "It has the largest silhouette", "It is closest to another cluster"], "correct": 0, "explanation": "Core points define the interior of dense clusters."}, {"q": "Which linkage handles non-elliptical shapes well but is sensitive to noise?", "options": ["MAX (complete)", "Group average", "MIN (single)", "Ward"], "correct": 2, "explanation": "Single link can follow chains of points, useful for elongated clusters but fragile to noise."}, {"q": "The silhouette coefficient of a point ranges typically:", "options": ["From 0 to infinity", "From -1 to 1", "From 0 to 1 with 1 as best", "Always positive"], "correct": 2, "explanation": "In the typical case a < b, the coefficient sits in [0, 1] with 1 meaning tightly clustered and well separated."}, {"q": "The elbow method is used to:", "options": ["Choose the best random seed", "Pick the number of clusters k", "Compute silhouette", "Fit centroid locations"], "correct": 1, "explanation": "It picks k at the bend in the SSE vs k plot."}, {"q": "DBSCAN struggles most on data with:", "options": ["Well-separated Gaussian clusters", "Clusters of very different densities", "Two clusters of the same size", "Noise-free data"], "correct": 1, "explanation": "A single Eps cannot suit both dense and sparse clusters simultaneously."}, {"q": "Which method does NOT require the number of clusters upfront?", "options": ["k-means", "k-medians", "DBSCAN", "Gaussian mixture with fixed K"], "correct": 2, "explanation": "DBSCAN infers clusters from density, not from a fixed k."}, {"q": "In agglomerative clustering, we stop merging when:", "options": ["The dataset is empty", "We reach the desired number of clusters or a single cluster remains", "SSE goes to zero", "Silhouette is 1"], "correct": 1, "explanation": "The tree is built until only one cluster remains, then cut at the desired level."}, {"q": "Between-cluster sum of squares (BSS) captures:", "options": ["Cohesion", "Separation", "Silhouette", "Cluster overlap"], "correct": 1, "explanation": "BSS measures the spread of cluster centers around the overall mean."}, {"q": "Which validation index compares clustering to external ground truth?", "options": ["SSE", "Silhouette", "Rand or Adjusted Rand Index", "WSS"], "correct": 2, "explanation": "Rand-like indices count agreements between predicted and true partitions."}], "flashcards": [{"front": "State the two steps of the k-means iteration.", "back": "Assign each point to nearest centroid; update centroids to be cluster means."}, {"front": "Why use k-medians instead of k-means?", "back": "Medians are less sensitive to outliers than means."}, {"front": "How would you detect that DBSCAN's Eps is too small?", "back": "Too many points become noise and clusters fragment."}, {"front": "What is the intuition of mean shift?", "back": "Slide a density window toward higher density; points that end at the same mode share a cluster."}, {"front": "Explain the silhouette formula in words.", "back": "For each point, compare its average distance within its cluster (a) to its average distance to the nearest other cluster (b); closer to 1 is better."}, {"front": "What is a dendrogram?", "back": "A tree that records the sequence of merges (or splits) in hierarchical clustering."}, {"front": "How do MIN and MAX linkage differ visually on elongated clusters?", "back": "MIN follows chains and can capture curves; MAX prefers compact round clusters."}, {"front": "Elbow method in one line.", "back": "Choose k at the point where SSE stops decreasing quickly."}, {"front": "Difference between internal and external cluster validation.", "back": "Internal uses only data (SSE, silhouette); external compares against known labels."}, {"front": "Give a limitation of the SSE-based elbow method.", "back": "The elbow is often ambiguous, especially for overlapping clusters."}, {"front": "One reason DBSCAN is preferable to k-means for anomaly detection.", "back": "DBSCAN explicitly labels sparse points as noise."}, {"front": "How does agglomerative clustering scale to large datasets?", "back": "Poorly, because a proximity matrix over all pairs of points is needed."}, {"front": "Why is cluster quality 'in the eye of the beholder'?", "back": "Different distance metrics or linkages can give equally valid but different clusters."}, {"front": "Which linkage tends to produce compact spherical clusters?", "back": "Complete (MAX) linkage."}, {"front": "How to determine Eps in DBSCAN empirically?", "back": "Plot sorted distances to the k-th nearest neighbor and choose Eps at the elbow."}, {"front": "State the two DBSCAN parameters.", "back": "Eps (neighborhood radius) and MinPts (minimum neighbors)."}], "short_answer": [{"prompt": "Explain in 3-4 sentences why k-means struggles with clusters of very different sizes or densities.", "sample_answer": "k-means minimizes squared distances to centroids, so it prefers roughly spherical clusters of similar size. Large clusters attract more points and shift centroids toward their center of mass, pulling boundaries away from small clusters. Dense and sparse regions produce similar centroids because they weight points equally. Density-based methods such as DBSCAN or mixtures with tied variances are usually better for such geometries."}, {"prompt": "Explain how DBSCAN classifies points and why it can find non-convex clusters.", "sample_answer": "DBSCAN counts each point's neighbors within radius Eps; points with at least MinPts neighbors are core, points in the neighborhood of core points are border, others are noise. Core points connected transitively through Eps form a cluster and pull their border points in. Because clusters are grown by chained density rather than distance to a centroid, the resulting shapes can bend and stretch without constraint."}, {"prompt": "Describe how you would validate a clustering result without labels.", "sample_answer": "Use internal indices such as SSE for compactness and average silhouette for cohesion and separation together. Visualize the ordered similarity matrix to look for block structure. Compare stability across resamples or seeds and inspect cluster prototypes with domain experts. Density-based clusters need indices that do not assume spherical shape, since SSE is misleading there."}, {"prompt": "How do you pick k in k-means when the elbow is not obvious?", "sample_answer": "Combine methods: use the average silhouette curve which often peaks at a good k, apply the gap statistic against a reference null, and check stability across bootstraps of the data. Domain constraints on the number of segments are also valid inputs. Ultimately k should be chosen to make the downstream task easier, not just to minimize an internal index."}, {"prompt": "Give a scenario where hierarchical clustering is preferable to k-means.", "sample_answer": "When you want a full hierarchy for exploration, for example gene expression studies or taxonomies. Agglomerative clustering does not require k upfront; you can cut the dendrogram at whatever level suits the analysis. It also captures nested structure that k-means, which produces a flat partition, cannot represent. Trade-off: it does not scale well beyond thousands of samples."}], "pitfalls": ["Using k-means SSE to compare across different k without normalization.", "Setting Eps too tightly and labeling almost every DBSCAN point as noise.", "Interpreting hierarchical single-link dendrograms in the presence of noise.", "Assuming silhouette is meaningful for density-based clusters.", "Reporting cluster stability from a single random seed only."]}, {"id": 4, "title": "Classification", "overview": "Reviews the choice of classifier through the bias-variance lens (No Free Lunch), then walks through kNN, Naive Bayes, SVMs (linear and kernelized), and decision trees. Also covers how to reason about training/test error, regularization, and the practical trade-offs including multi-class strategies and kernel selection.", "concepts": [{"term": "No Free Lunch", "definition": "No single classifier is best on every problem; performance depends on data assumptions."}, {"term": "Bias", "definition": "Error from overly simple assumptions; average model differs from true model."}, {"term": "Variance", "definition": "Error from model sensitivity to the specific training set."}, {"term": "Bias-variance tradeoff", "definition": "Total expected error decomposes into bias^2 + variance + irreducible noise; complexity trades one for the other."}, {"term": "Underfitting", "definition": "Model too simple; high training and test error, high bias, low variance."}, {"term": "Overfitting", "definition": "Model too complex; low training error but high test error, low bias, high variance."}, {"term": "Generative model", "definition": "Models the joint distribution of features and labels, e.g., Naive Bayes."}, {"term": "Discriminative model", "definition": "Directly models decision boundaries or class probabilities, e.g., SVM."}, {"term": "kNN classifier", "definition": "Assigns the majority class of the k nearest training samples in feature space."}, {"term": "Naive Bayes", "definition": "Applies Bayes' rule assuming conditional independence of features given the class."}, {"term": "SVM", "definition": "Finds the hyperplane maximizing the margin between classes; support vectors define the boundary."}, {"term": "Kernel trick", "definition": "Compute inner products in a high-dimensional feature space without ever mapping there explicitly."}, {"term": "One-vs-rest vs one-vs-one", "definition": "Strategies for building multi-class classifiers from binary SVMs."}, {"term": "Decision tree", "definition": "Recursive partition of feature space by attribute tests, chosen to maximize purity gain."}, {"term": "Information gain / Gini", "definition": "Purity measures used to pick the best split at each node."}], "formulas": [{"name": "Bias-variance decomposition", "latex": "E[\\text{MSE}] = \\text{noise}^2 + \\text{bias}^2 + \\text{variance}", "note": "Explains why more complex models trade bias for variance."}, {"name": "Bayes rule (Naive Bayes)", "latex": "P(y|x) \\propto P(y) \\prod_i P(x_i|y)", "note": "Feature independence assumption given the class."}, {"name": "SVM primal", "latex": "\\min_{w,b} \\tfrac{1}{2}\\|w\\|^2 \\text{ s.t. } y_i(w^\\top x_i + b) \\ge 1", "note": "Hard-margin form; soft margin adds slack variables and a C penalty."}, {"name": "RBF kernel", "latex": "K(x, x') = \\exp(-\\gamma \\|x - x'\\|^2)", "note": "Common non-linear kernel; gamma controls smoothness."}, {"name": "Information gain", "latex": "IG(S, A) = H(S) - \\sum_v \\frac{|S_v|}{|S|} H(S_v)", "note": "Used to pick the split attribute in ID3-style trees."}], "mcqs": [{"q": "The bias-variance tradeoff implies:", "options": ["More data always increases variance", "Simpler models have higher variance", "Increasing model complexity reduces bias but tends to raise variance", "Underfit models have low bias"], "correct": 2, "explanation": "The core tradeoff: complex models fit training data more tightly but generalize worse."}, {"q": "kNN with k=1 tends to have:", "options": ["High bias, low variance", "Low bias, high variance", "Both low", "Both high"], "correct": 1, "explanation": "Very local decisions cause high variance and low bias."}, {"q": "Naive Bayes assumes:", "options": ["Features are correlated", "Class-conditional feature independence", "The data is Gaussian in all cases", "Labels are noisy"], "correct": 1, "explanation": "The 'naive' assumption is that features are independent given the class."}, {"q": "Support vectors are:", "options": ["Any misclassified points", "Training points that lie on or within the margin and define the boundary", "Test points closest to the mean", "Points removed during preprocessing"], "correct": 1, "explanation": "Only support vectors influence the SVM hyperplane."}, {"q": "Choosing a smaller C in soft-margin SVM will:", "options": ["Force zero training error", "Allow more margin violations, favoring wider margins", "Remove the kernel", "Reduce test accuracy always"], "correct": 1, "explanation": "Smaller C penalizes slack less, giving a wider but more forgiving margin."}, {"q": "The kernel trick avoids:", "options": ["Computing dot products in high-dimensional space explicitly", "Training the model", "Feature scaling", "Cross-validation"], "correct": 0, "explanation": "It rewrites the dot product via a kernel function, sidestepping the explicit mapping."}, {"q": "A decision tree splits on the attribute that:", "options": ["Has the highest information gain", "Appears first alphabetically", "Has the largest variance", "Is not correlated with the label"], "correct": 0, "explanation": "Splits are picked to maximize purity gain."}, {"q": "One-vs-rest multi-class SVM predicts:", "options": ["The class whose binary SVM outputs the highest decision value", "Any class at random", "The class with the smallest support vectors", "The class with the largest margin at test time"], "correct": 0, "explanation": "Each binary classifier scores its class against the rest; highest wins."}, {"q": "You observe high training accuracy and low test accuracy. Most likely diagnosis?", "options": ["Underfitting", "Overfitting", "Perfectly regularized", "Random labels"], "correct": 1, "explanation": "That gap is the hallmark of overfitting."}, {"q": "Which of these is a generative classifier?", "options": ["SVM", "Naive Bayes", "Logistic regression", "kNN"], "correct": 1, "explanation": "Naive Bayes models P(x, y); SVM/logistic regression are discriminative."}], "flashcards": [{"front": "State the No Free Lunch theorem in one sentence.", "back": "Averaged over all problems, no learner beats any other, so choice depends on data assumptions."}, {"front": "How do you reduce variance in a model?", "back": "Use a simpler model, add regularization, or gather more training data."}, {"front": "Give the intuition of a maximum-margin classifier.", "back": "Find the hyperplane that leaves the largest possible gap between classes."}, {"front": "Why is kNN considered non-parametric?", "back": "It stores all training data and makes no functional-form assumption about the boundary."}, {"front": "Name a common kernel used in SVM.", "back": "Linear, polynomial, radial basis function (RBF), or sigmoid."}, {"front": "Explain the role of gamma in an RBF kernel.", "back": "Higher gamma makes the kernel narrow, giving flexible boundaries that risk overfitting."}, {"front": "How does Naive Bayes handle categorical features?", "back": "By estimating P(x_i|y) as counts with Laplace smoothing."}, {"front": "Give one strength of decision trees.", "back": "Interpretable, handles mixed feature types, requires little preprocessing."}, {"front": "Give one weakness of decision trees.", "back": "High variance; small data changes can flip splits, hence the popularity of ensembles."}, {"front": "Why can Naive Bayes still work despite the independence assumption?", "back": "Even wrong probabilities can yield correct rankings for classification."}, {"front": "Difference between generative and discriminative models?", "back": "Generative models P(x, y); discriminative models P(y|x) or the boundary directly."}, {"front": "One way to build a multi-class SVM.", "back": "One-vs-one voting or one-vs-rest with highest decision value."}, {"front": "What is a support vector, geometrically?", "back": "A training point lying on or inside the margin that constrains the hyperplane."}, {"front": "State the effect of C on a soft-margin SVM.", "back": "Larger C penalizes misclassification more, giving tighter fit; smaller C prefers wider margin."}, {"front": "Why do we tune kernel parameters via cross-validation?", "back": "There's no analytical way to choose them; performance depends on data."}], "short_answer": [{"prompt": "Explain the bias-variance decomposition and how it guides model selection.", "sample_answer": "Expected squared error decomposes into irreducible noise, squared bias, and variance. Simpler models have high bias because they cannot capture the true function, while complex models have high variance because they fit noise. The sweet spot minimizes the sum, and it shifts with the amount of training data: more data suppresses variance and lets us afford more complex models. Model selection therefore trades off complexity against expected test error, often via cross-validation."}, {"prompt": "Contrast generative and discriminative classifiers with an example each.", "sample_answer": "Generative classifiers model P(x, y) and derive predictions via Bayes' rule; Naive Bayes is a typical example. Discriminative classifiers model P(y|x) or the decision boundary directly; SVM and logistic regression are examples. Generative models can leverage priors and generate synthetic data, but they need stronger distribution assumptions. Discriminative models usually give higher accuracy when large labeled datasets are available."}, {"prompt": "Explain the kernel trick in the context of SVMs.", "sample_answer": "SVMs can be written so that training and prediction depend only on inner products between input vectors. The kernel trick replaces those inner products with a kernel K(x, x') that corresponds to the inner product in a high-dimensional feature space induced by an implicit mapping phi. This lets us learn non-linear decision boundaries without computing phi explicitly, keeping cost bounded by the number of training points."}, {"prompt": "How does a decision tree decide where to split?", "sample_answer": "At each node it evaluates candidate splits over the available features and chooses the one that maximizes a purity gain such as information gain or Gini decrease. It then recursively grows subtrees on the induced partitions. Growing stops when purity reaches a threshold, the depth cap is hit, or too few samples remain. Pruning or ensembles like random forests are usually needed to control the tree's variance."}, {"prompt": "Given a small dataset with many features, would you pick kNN or SVM? Justify.", "sample_answer": "SVM is typically better because it handles high-dimensional feature spaces gracefully and is less prone to the curse of dimensionality than kNN. kNN's distance-based decisions become uninformative when there are many irrelevant features. SVM with an appropriate kernel and regularization also tends to generalize better with few samples. If the data is truly low-dimensional or the boundary is very local, kNN with careful feature scaling can still be competitive."}], "pitfalls": ["Reporting only training accuracy and missing overfitting.", "Not scaling features before kNN or SVM, breaking distance/kernel calculations.", "Assuming Naive Bayes probabilities are calibrated.", "Using a single deep decision tree without pruning or ensembling.", "Choosing kernel parameters without cross-validation."]}, {"id": 5, "title": "Imbalanced Datasets", "overview": "Explains why imbalance breaks standard classifiers and how to handle it via sampling (random, SMOTE, ADASYN, Tomek cleanup), cost-sensitive learning, and kernel-based tweaks. It also covers the right evaluation metrics for skewed problems, including precision-recall curves, F1, ROC/AUC, and cost curves.", "concepts": [{"term": "Class imbalance", "definition": "Training distribution where one class heavily outnumbers others, often 100:1 to 10,000:1."}, {"term": "Between-class vs within-class imbalance", "definition": "Between-class is skew between the labels; within-class is skew among sub-concepts of the same label."}, {"term": "Intrinsic vs extrinsic imbalance", "definition": "Intrinsic reflects the natural data distribution; extrinsic comes from collection artifacts such as time-limited sampling."}, {"term": "Random undersampling", "definition": "Removes majority-class examples at random to rebalance the training set."}, {"term": "Random oversampling", "definition": "Duplicates minority-class examples to rebalance the training set; risks overfitting."}, {"term": "SMOTE", "definition": "Synthetic Minority Over-sampling Technique creates new minority samples by interpolating between a point and its nearest minority neighbors."}, {"term": "ADASYN", "definition": "Adaptive synthetic sampling that generates more samples for minority points near the decision boundary."}, {"term": "Tomek links", "definition": "Pairs of nearest neighbors of opposite classes; removing them cleans up overlap after resampling."}, {"term": "Cost-sensitive learning", "definition": "Assigns higher misclassification cost to minority errors during training, without changing the sampling."}, {"term": "Kernel-based methods for imbalance", "definition": "Modifies the SVM soft-margin objective to counter the bias of the hyperplane toward the majority class."}, {"term": "Confusion matrix", "definition": "Table of TP, FP, TN, FN counts from which precision, recall, F1, and cost metrics are derived."}, {"term": "Precision", "definition": "TP / (TP + FP); how many predicted positives are actually positive."}, {"term": "Recall (sensitivity)", "definition": "TP / (TP + FN); how many actual positives are recovered."}, {"term": "F-beta score", "definition": "Weighted harmonic mean of precision and recall, beta controls the recall weight."}, {"term": "Precision-Recall curve", "definition": "Preferred over ROC in high skew because it is sensitive to false positives when the negative class is large."}, {"term": "Cost curves", "definition": "Plot expected cost as a function of positive class probability; a classifier dominates if its curve stays below."}], "formulas": [{"name": "Precision", "latex": "\\text{Precision} = \\frac{TP}{TP + FP}", "note": "How useful the returned positives are."}, {"name": "Recall", "latex": "\\text{Recall} = \\frac{TP}{TP + FN}", "note": "How complete the retrieval of positives is."}, {"name": "F1 score", "latex": "F_1 = \\frac{2 \\cdot \\text{Precision} \\cdot \\text{Recall}}{\\text{Precision} + \\text{Recall}}", "note": "Balanced summary of precision and recall."}, {"name": "F-beta", "latex": "F_\\beta = (1+\\beta^2) \\cdot \\frac{P \\cdot R}{\\beta^2 P + R}", "note": "Beta > 1 emphasizes recall, beta < 1 emphasizes precision."}, {"name": "Cost curve line", "latex": "\\text{Error rate} = (FN - FP) \\cdot p(+) + FP", "note": "Represents a ROC point as a line in cost space."}], "mcqs": [{"q": "Why is accuracy misleading with a 99:1 imbalance?", "options": ["It punishes majority errors", "A trivial 'always negative' classifier scores 99%", "It counts only true positives", "It requires cross-validation"], "correct": 1, "explanation": "In heavy skew the majority-class-only baseline already achieves the majority rate."}, {"q": "SMOTE generates new minority samples by:", "options": ["Copying existing samples", "Interpolating between a minority point and its neighbors", "Rotating majority samples", "Sampling Gaussian noise"], "correct": 1, "explanation": "Interpolation with k nearest minority neighbors produces synthetic examples."}, {"q": "Which is a limitation of random oversampling?", "options": ["It always improves recall", "It reduces training time", "It overfits by duplicating minority points", "It removes noise"], "correct": 2, "explanation": "Duplicating exact copies gives the classifier no new information and encourages overfitting."}, {"q": "In a highly imbalanced setting, PR curves are preferred over ROC because:", "options": ["ROC always returns 1", "ROC's FP rate stays low even when many false positives occur, hiding the problem", "PR curves ignore false positives", "ROC needs balanced data to run"], "correct": 1, "explanation": "With huge negative counts, small FP-rate changes hide bursts of false positives; PR is sensitive to them."}, {"q": "Cost-sensitive AdaBoost adapts to imbalance by:", "options": ["Weighting minority samples more in resampling for the next iteration", "Removing hard majority samples", "Randomly relabeling", "Reducing base classifier accuracy"], "correct": 0, "explanation": "It biases the reweighting scheme toward minority examples."}, {"q": "Tomek link removal is typically used:", "options": ["Before oversampling to reduce noise", "As a cleaning step after SMOTE to remove overlaps", "Instead of any sampling", "To generate synthetic samples"], "correct": 1, "explanation": "It removes majority-minority nearest-neighbor pairs that blur the boundary after oversampling."}, {"q": "Which is TRUE about kernel-based SVM adjustments for imbalance?", "options": ["They ignore the minority class", "They modify soft-margin costs to correct hyperplane bias", "They convert SVM to a decision tree", "They eliminate the need for sampling entirely"], "correct": 1, "explanation": "Class-dependent slack penalties or class weights counter the natural bias toward the majority."}, {"q": "The F1 score peaks when:", "options": ["Precision is 1 regardless of recall", "Recall is 1 regardless of precision", "Precision and recall are balanced and both high", "TP is zero"], "correct": 2, "explanation": "The harmonic mean rewards balanced high precision and recall."}, {"q": "ADASYN differs from SMOTE by:", "options": ["Only oversampling exact duplicates", "Focusing generation near hard-to-learn minority points", "Requiring balanced data upfront", "Using kernels"], "correct": 1, "explanation": "It generates more synthetic samples where the local density of majority points is higher."}, {"q": "In cost curves, a classifier C1 dominates C2 if:", "options": ["C1's curve lies below C2's for all values of P(+)", "C1's AUC is higher", "C1 has fewer parameters", "C1 uses SMOTE"], "correct": 0, "explanation": "Domination means lower expected cost over the whole range of class priors."}], "flashcards": [{"front": "Give the intuition behind SMOTE.", "back": "Create new minority points by walking a fraction of the way toward a minority neighbor."}, {"front": "When would you pick undersampling over oversampling?", "back": "When majority-class data is very large and you can afford to drop some without losing signal."}, {"front": "One weakness of undersampling?", "back": "It discards potentially informative majority samples."}, {"front": "State a cost-sensitive alternative to sampling.", "back": "Weight minority errors more in the loss, or set class_weight='balanced' in sklearn."}, {"front": "Why is precision-recall AUC more informative than ROC AUC when positives are rare?", "back": "ROC AUC is insensitive to large increases in false positives when negatives dominate."}, {"front": "Give the precision formula.", "back": "TP / (TP + FP)."}, {"front": "Give the recall formula.", "back": "TP / (TP + FN)."}, {"front": "What does F2 emphasize compared to F1?", "back": "Recall is weighted more heavily than precision."}, {"front": "Name a within-class imbalance situation.", "back": "One sub-cluster of the minority class dominates the other sub-clusters."}, {"front": "Purpose of Tomek link cleanup?", "back": "Remove boundary majority-minority pairs to sharpen the decision surface."}, {"front": "Trade-off of SMOTE?", "back": "It can generate noisy or unrealistic points when minority neighbors span noise."}, {"front": "One kernel-side fix for imbalance?", "back": "Use class-weighted SVM: give higher C for the minority class."}, {"front": "How does BalanceCascade work?", "back": "It iteratively removes correctly classified majority samples to keep only informative ones."}, {"front": "What is EasyEnsemble?", "back": "Trains several classifiers on random balanced subsets of the majority class and combines them."}, {"front": "Why is accuracy still reported even in imbalance?", "back": "As one metric among many; alone it hides class-specific behavior."}], "short_answer": [{"prompt": "Explain why standard classifiers become biased toward the majority class under heavy imbalance.", "sample_answer": "Most losses treat all errors as equal, so minimizing expected error means predicting the majority class more often. In gradient descent the majority contributes most gradient signal, pulling the decision boundary toward the minority. SVMs push the hyperplane toward the sparse side because there are few support vectors defending it. Without correction the classifier trivially achieves high accuracy but near-zero recall on the class we care about."}, {"prompt": "Compare SMOTE and cost-sensitive learning in 3-4 sentences.", "sample_answer": "SMOTE synthesizes new minority points to balance the data before training, so any downstream model is unaware of the imbalance. Cost-sensitive learning keeps the data intact and instead scales the loss for minority errors. SMOTE can inject noise into ambiguous regions but preserves gradient signal for all classifiers; cost-sensitive learning is model-specific but avoids fabricating data. Often the best pipeline combines mild oversampling with class weights."}, {"prompt": "Argue for using precision-recall curves over ROC in heavily skewed classification.", "sample_answer": "ROC uses the false-positive rate, whose denominator (total negatives) is huge under skew, so many extra false positives barely move the curve. Precision uses TP over TP+FP, so a burst of false positives is felt immediately. Precision-recall curves therefore emphasize the true operating region of a rare-class classifier. AUC on the PR curve is a better summary of retrieval quality when positives are scarce."}, {"prompt": "Describe a full pipeline for training on an imbalanced medical dataset.", "sample_answer": "Split off a stratified test set first. On the training set apply SMOTE combined with Tomek link cleanup to rebalance while cleaning overlaps. Use a cost-sensitive learner and tune class weights via cross-validation, optimizing PR-AUC or F2. Report multiple metrics, including recall at fixed precision, and validate against the held-out test set that preserves the original prior."}, {"prompt": "Explain what cost curves add compared to ROC.", "sample_answer": "Cost curves plot expected misclassification cost as a linear function of the positive-class prior p(+), turning each ROC point into a line. They make it easy to see which classifier is best across the whole range of possible skews or cost ratios. A classifier dominates another only if its cost line is lower for all values of p(+). This is more actionable than a single AUC when deployment priors differ from training priors."}], "pitfalls": ["Applying SMOTE on the test set or before the train/test split.", "Reporting only accuracy on a skewed problem.", "Using duplicate oversampling instead of a synthetic scheme, causing overfitting.", "Assuming ROC-AUC alone is enough for rare-event evaluation.", "Forgetting to keep the original class prior when evaluating."]}, {"id": 6, "title": "Neural Networks and CNN Intro", "overview": "Introduces the perceptron, feedforward MLPs, backpropagation, and standard activation functions, then extends to convolutional networks that exploit local connectivity, weight sharing, and pooling to handle images. Covers the key CNN building blocks (convolution, ReLU, pooling, fully connected head) and why they scale to images better than fully connected MLPs.", "concepts": [{"term": "Neuron model", "definition": "Weighted sum of inputs plus a bias, followed by a non-linear activation."}, {"term": "Perceptron", "definition": "Single-layer linear classifier updated by the delta rule; can only learn linearly separable functions."}, {"term": "Multilayer perceptron (MLP)", "definition": "Feedforward network of one or more hidden layers of neurons; universal function approximator."}, {"term": "Activation function", "definition": "Non-linearity applied to the weighted input, e.g., sigmoid, tanh, or ReLU."}, {"term": "Backpropagation", "definition": "Chain-rule algorithm that computes gradients of the loss with respect to weights layer by layer."}, {"term": "Gradient descent", "definition": "Iterative optimization moving weights against the loss gradient; SGD samples mini-batches."}, {"term": "Delta rule", "definition": "Weight update proportional to error times input, derived from gradient descent on squared loss."}, {"term": "Learning rate", "definition": "Step size multiplier controlling how far weights move each update."}, {"term": "Universal approximation", "definition": "An MLP with one hidden layer of enough neurons can approximate any continuous function on a compact domain."}, {"term": "Convolutional layer", "definition": "Applies learnable filters via convolution to produce feature maps, exploiting local receptive fields."}, {"term": "Local connectivity", "definition": "Each convolutional neuron sees only a small spatial patch of the input, cutting parameters."}, {"term": "Shared weights", "definition": "All positions of a filter share the same kernel weights, enforcing translation equivariance."}, {"term": "Pooling", "definition": "Downsampling operation (max or average) that shrinks feature maps and adds spatial invariance."}, {"term": "Receptive field", "definition": "Region of the input that contributes to a given activation deeper in the network."}, {"term": "Feature map", "definition": "Output activations of one filter over the whole spatial input; multiple maps per convolutional layer."}], "formulas": [{"name": "Neuron output", "latex": "y = \\varphi\\left(\\sum_j w_j x_j + b\\right)", "note": "Weighted sum plus bias, activated non-linearly."}, {"name": "Delta rule weight update", "latex": "w_{ij} \\leftarrow w_{ij} + \\eta (t_j - y_j) x_i", "note": "Perceptron style update; eta is the learning rate."}, {"name": "Sigmoid", "latex": "\\sigma(x) = \\frac{1}{1 + e^{-x}}", "note": "Smooth activation with output in (0, 1)."}, {"name": "ReLU", "latex": "\\text{ReLU}(x) = \\max(0, x)", "note": "Piecewise linear activation used in most modern CNNs."}, {"name": "2D convolution", "latex": "y_{i,j} = \\sum_{u,v} w_{u,v} \\cdot x_{i+u,\\,j+v} + b", "note": "Kernel slides across spatial locations to produce a feature map."}], "mcqs": [{"q": "What limitation motivated moving from perceptrons to MLPs?", "options": ["MLPs are always faster", "Perceptrons cannot learn non-linearly separable functions like XOR", "Perceptrons overfit less", "Perceptrons need too much memory"], "correct": 1, "explanation": "A single-layer perceptron cannot represent XOR."}, {"q": "Backpropagation computes gradients by applying:", "options": ["Random search", "The chain rule layer-by-layer", "Newton's method", "Genetic algorithms"], "correct": 1, "explanation": "It differentiates the composed loss using the chain rule from output to input."}, {"q": "ReLU is preferred over sigmoid mainly because:", "options": ["It is bounded", "It avoids vanishing gradients for positive inputs and is cheap to compute", "It normalizes activations to sum to 1", "It has no dying units"], "correct": 1, "explanation": "ReLU passes positive gradients unchanged and requires no exp calls."}, {"q": "Weight sharing in convolutional layers means:", "options": ["Each neuron has its own filter", "The same kernel is applied at every spatial location", "Weights are shared across GPUs", "All layers share the same weights"], "correct": 1, "explanation": "Each filter has one shared kernel scanning the whole input."}, {"q": "Max pooling primarily adds:", "options": ["More parameters", "Local spatial invariance and reduced feature map size", "Non-linear activation", "Batch normalization"], "correct": 1, "explanation": "It picks the max within a window, invariant to small shifts."}, {"q": "In a fully connected network on 224x224 RGB images, parameter counts explode because:", "options": ["Every input pixel connects to every hidden neuron", "Convolutions are missing", "Only ReLU is used", "Pooling is disabled"], "correct": 0, "explanation": "The dense connection between all pixels and hidden units blows up parameters."}, {"q": "The receptive field of a stacked convolutional network:", "options": ["Stays the same at every layer", "Grows with depth as more layers combine local views", "Shrinks with depth", "Is unrelated to depth"], "correct": 1, "explanation": "Each additional layer aggregates information from a larger input region."}, {"q": "Cross-entropy loss is more appropriate than MSE for classification because:", "options": ["It penalizes probability mismatches proportional to log likelihood", "It is faster to compute", "It ignores label imbalance", "It uses fewer parameters"], "correct": 0, "explanation": "It aligns with maximum likelihood for categorical outputs and gives strong gradients."}, {"q": "Which is a convolutional layer's advantage over a fully connected layer for image tasks?", "options": ["More parameters per image", "Translation equivariance", "No non-linearity needed", "Guaranteed lower training loss"], "correct": 1, "explanation": "A translated input causes a correspondingly translated feature map."}, {"q": "Stride 2 in a convolution produces output that:", "options": ["Has the same size as input", "Is roughly half the spatial size of input", "Is twice the input size", "Is a scalar"], "correct": 1, "explanation": "Stride s downsamples spatial dimensions by a factor of ~s."}], "flashcards": [{"front": "State the perceptron learning rule.", "back": "w += eta * (target - output) * input."}, {"front": "Why do we add a bias to a neuron?", "back": "It shifts the activation threshold independently of the input scale."}, {"front": "Two problems of sigmoid activations in deep nets?", "back": "Vanishing gradients and outputs not zero-centered."}, {"front": "State backprop in one line.", "back": "Propagate the error signal delta backward through the layers using the chain rule to update weights."}, {"front": "Give the definition of a feature map.", "back": "The output of one convolutional filter over all spatial positions of the input."}, {"front": "Why does weight sharing reduce parameters?", "back": "Instead of independent weights per pixel, one kernel is reused across the whole spatial grid."}, {"front": "What does max pooling gain over average pooling?", "back": "Emphasizes the strongest activation and gives stronger local invariance."}, {"front": "Give the shape of a 3x3 kernel over an RGB input.", "back": "3x3x3 weights per filter."}, {"front": "Why is ReLU cheap?", "back": "It is a simple thresholding operation, no exponentials."}, {"front": "What is a common cause of dying ReLUs?", "back": "Large negative pre-activations locking a neuron at zero forever."}, {"front": "Purpose of the fully connected head in a CNN classifier?", "back": "Combine spatially pooled features into class scores."}, {"front": "What is the universal approximation theorem?", "back": "A single hidden-layer MLP with enough neurons can approximate any continuous function on a compact domain."}, {"front": "Which optimizer keeps a moving average of gradients and their squares?", "back": "Adam."}, {"front": "Why do we use mini-batch SGD instead of full-batch?", "back": "Batch size trades between gradient noise and hardware efficiency."}, {"front": "State the intuition of translation equivariance.", "back": "Shift the input by k pixels and the feature map shifts by k pixels too."}], "short_answer": [{"prompt": "Explain how backpropagation combines the chain rule and gradient descent to train an MLP.", "sample_answer": "During the forward pass the network computes the loss for a batch of inputs. Backpropagat
