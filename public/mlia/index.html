  const persisted = {
    fcKnown: state.fcKnown,
    mcqAnswers: state.mcqAnswers,
    saRevealed: state.saRevealed,
  };
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(persisted)); } catch (e) {}
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const s = JSON.parse(raw);
    Object.assign(state.fcKnown, s.fcKnown || {});
    Object.assign(state.mcqAnswers, s.mcqAnswers || {});
    Object.assign(state.saRevealed, s.saRevealed || {});
  } catch (e) {}
}

function progressFor(lecture) {
  // fraction of MCQs answered correctly across all MCQs in the lecture
  const total = lecture.mcqs.length;
  if (!total) return 0;
  let correct = 0;
  lecture.mcqs.forEach((m, i) => {
    const chosen = state.mcqAnswers[lecture.id + '.' + i];
    if (chosen === m.correct) correct++;
  });
  return correct / total;
}

function renderNav() {
  const nav = document.getElementById('nav');
  nav.innerHTML = '';
  LECTURES.forEach((lec, i) => {
    const el = document.createElement('div');
    el.className = 'nav-item' + (i === state.currentIdx ? ' active' : '');
    el.onclick = () => { state.currentIdx = i; state.currentTab = 'concepts'; renderNav(); renderMain(); };
    const num = document.createElement('span');
    num.className = 'num';
    num.textContent = String(lec.id).padStart(2, '0');
    const title = document.createElement('span');
    title.className = 'title';
    title.textContent = lec.title;
    const prog = document.createElement('span');
    prog.className = 'progress';
    const p = progressFor(lec);
    prog.textContent = p > 0 ? Math.round(p * 100) + '%' : '';
    el.appendChild(num);
    el.appendChild(title);
    el.appendChild(prog);
    nav.appendChild(el);
  });
}

function renderMain() {
  const lec = LECTURES[state.currentIdx];
  const main = document.getElementById('main');
  const counts = {
    concepts: lec.concepts.length,
    formulas: (lec.formulas || []).length,
    flashcards: lec.flashcards.length,
    mcqs: lec.mcqs.length,
    short: lec.short_answer.length,
    pitfalls: (lec.pitfalls || []).length,
  };
  const tabs = [
    { id: 'concepts', label: 'Concepts', count: counts.concepts },
    { id: 'formulas', label: 'Formulas', count: counts.formulas },
    { id: 'flashcards', label: 'Flashcards', count: counts.flashcards },
    { id: 'mcqs', label: 'Quiz', count: counts.mcqs },
    { id: 'short', label: 'Short answers', count: counts.short },
    { id: 'pitfalls', label: 'Pitfalls', count: counts.pitfalls },
  ].filter(t => t.count > 0);

  main.innerHTML = '';
  const header = document.createElement('div');
  header.className = 'lecture-header';
  const num = document.createElement('span'); num.className = 'num'; num.textContent = 'L' + String(lec.id).padStart(2, '0');
  const h1 = document.createElement('h1'); h1.textContent = lec.title;
  header.appendChild(num); header.appendChild(h1);
  const overview = document.createElement('p'); overview.className = 'overview'; overview.textContent = lec.overview;
  main.appendChild(header);
  main.appendChild(overview);

  const tabsEl = document.createElement('div');
  tabsEl.className = 'tabs';
  tabs.forEach(t => {
    const tabBtn = document.createElement('div');
    tabBtn.className = 'tab' + (t.id === state.currentTab ? ' active' : '');
    tabBtn.innerHTML = t.label + ' <span class="count">' + t.count + '</span>';
    tabBtn.onclick = () => { state.currentTab = t.id; renderMain(); };
    tabsEl.appendChild(tabBtn);
  });
  main.appendChild(tabsEl);

  const panel = document.createElement('div');
  panel.className = 'panel active';
  main.appendChild(panel);

  if (state.currentTab === 'concepts') renderConcepts(panel, lec);
  else if (state.currentTab === 'formulas') renderFormulas(panel, lec);
  else if (state.currentTab === 'flashcards') renderFlashcards(panel, lec);
  else if (state.currentTab === 'mcqs') renderMCQs(panel, lec);
  else if (state.currentTab === 'short') renderShort(panel, lec);
  else if (state.currentTab === 'pitfalls') renderPitfalls(panel, lec);

  if (window.MathJax && window.MathJax.typesetPromise) {
    window.MathJax.typesetPromise([panel]).catch(() => {});
  }
}

function renderConcepts(panel, lec) {
  const list = document.createElement('div'); list.className = 'concept-list';
  lec.concepts.forEach(c => {
    const el = document.createElement('div'); el.className = 'concept';
    const term = document.createElement('div'); term.className = 'term'; term.textContent = c.term;
    const def = document.createElement('div'); def.className = 'def'; def.textContent = c.definition;
    el.appendChild(term); el.appendChild(def);
    list.appendChild(el);
  });
  panel.appendChild(list);
}

function renderFormulas(panel, lec) {
  const list = document.createElement('div'); list.className = 'formula-list';
  (lec.formulas || []).forEach(f => {
    const el = document.createElement('div'); el.className = 'formula';
    const name = document.createElement('div'); name.className = 'name'; name.textContent = f.name;
    const latex = document.createElement('div'); latex.className = 'latex'; latex.textContent = '$$' + f.latex + '$$';
    const note = document.createElement('div'); note.className = 'note'; note.textContent = f.note || '';
    el.appendChild(name); el.appendChild(latex);
    if (f.note) el.appendChild(note);
    list.appendChild(el);
  });
  panel.appendChild(list);
}

function renderFlashcards(panel, lec) {
  if (!state.fcOrder[lec.id]) {
    state.fcOrder[lec.id] = lec.flashcards.map((_, i) => i);
  }
  if (state.fcIndex[lec.id] === undefined) state.fcIndex[lec.id] = 0;

  const order = state.fcOrder[lec.id];
  const idx = state.fcIndex[lec.id];
  const cardIdx = order[idx];
  const card = lec.flashcards[cardIdx];

  const controls = document.createElement('div'); controls.className = 'fc-controls';
  const pos = document.createElement('div'); pos.className = 'position'; pos.textContent = (idx + 1) + ' / ' + lec.flashcards.length;
  const shuf = document.createElement('button'); shuf.className = 'shuffle'; shuf.textContent = 'Shuffle';
  shuf.onclick = () => {
    const o = state.fcOrder[lec.id].slice();
    for (let i = o.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [o[i], o[j]] = [o[j], o[i]]; }
    state.fcOrder[lec.id] = o;
    state.fcIndex[lec.id] = 0;
    renderMain();
  };
  controls.appendChild(pos); controls.appendChild(shuf);
  panel.appendChild(controls);

  const fc = document.createElement('div'); fc.className = 'flashcard';
  const inner = document.createElement('div'); inner.className = 'flashcard-inner';
  const front = document.createElement('div'); front.className = 'fc-side front'; front.innerHTML = '<div class="hint">Q</div><div>' + escapeHtml(card.front) + '</div>';
  const back = document.createElement('div'); back.className = 'fc-side back'; back.innerHTML = '<div class="hint">A</div><div>' + escapeHtml(card.back) + '</div>';
  inner.appendChild(front); inner.appendChild(back);
  fc.appendChild(inner);
  fc.onclick = () => fc.classList.toggle('flipped');
  panel.appendChild(fc);

  const nav = document.createElement('div'); nav.className = 'fc-nav';
  const prev = document.createElement('button'); prev.textContent = 'Previous';
  prev.disabled = idx === 0;
  prev.onclick = () => { state.fcIndex[lec.id] = idx - 1; renderMain(); };

  const review = document.createElement('button'); review.className = 'review'; review.textContent = 'Review again';
  review.onclick = () => { state.fcKnown[lec.id + '.' + cardIdx] = 'review'; saveState(); if (idx < lec.flashcards.length - 1) state.fcIndex[lec.id] = idx + 1; renderMain(); };

  const known = document.createElement('button'); known.className = 'known'; known.textContent = 'Got it';
  known.onclick = () => { state.fcKnown[lec.id + '.' + cardIdx] = 'known'; saveState(); if (idx < lec.flashcards.length - 1) state.fcIndex[lec.id] = idx + 1; renderMain(); };

  const next = document.createElement('button'); next.textContent = 'Next';
  next.disabled = idx === lec.flashcards.length - 1;
  next.onclick = () => { state.fcIndex[lec.id] = idx + 1; renderMain(); };

  nav.appendChild(prev); nav.appendChild(review); nav.appendChild(known); nav.appendChild(next);
  panel.appendChild(nav);
}

function renderMCQs(panel, lec) {
  // summary bar
  const summary = document.createElement('div'); summary.className = 'mcq-summary';
  let answered = 0, correct = 0;
  lec.mcqs.forEach((m, i) => {
    const chosen = state.mcqAnswers[lec.id + '.' + i];
    if (chosen !== undefined) {
      answered++;
      if (chosen === m.correct) correct++;
    }
  });
  const score = document.createElement('div'); score.className = 'score'; score.textContent = 'Score: ' + correct + ' / ' + lec.mcqs.length;
  const meta = document.createElement('div'); meta.style.color = 'var(--text-muted)'; meta.textContent = answered + ' answered';
  const reset = document.createElement('button'); reset.className = 'reset'; reset.textContent = 'Reset quiz';
  reset.onclick = () => {
    lec.mcqs.forEach((_, i) => { delete state.mcqAnswers[lec.id + '.' + i]; });
    saveState();
    renderNav();
    renderMain();
  };
  summary.appendChild(score); summary.appendChild(meta); summary.appendChild(reset);
  panel.appendChild(summary);

  lec.mcqs.forEach((m, i) => {
    const el = document.createElement('div');
    el.className = 'mcq';
    const chosen = state.mcqAnswers[lec.id + '.' + i];
    if (chosen !== undefined) el.classList.add('answered');

    const q = document.createElement('div'); q.className = 'q';
    q.innerHTML = '<span class="qnum">Q' + (i + 1) + '.</span>' + escapeHtml(m.q);
    el.appendChild(q);

    const opts = document.createElement('div'); opts.className = 'options';
    m.options.forEach((opt, j) => {
      const oel = document.createElement('div');
      oel.className = 'opt';
      const letter = document.createElement('span'); letter.className = 'letter'; letter.textContent = String.fromCharCode(65 + j);
      const text = document.createElement('span'); text.textContent = opt;
      oel.appendChild(letter); oel.appendChild(text);
      if (chosen !== undefined) {
        oel.classList.add('locked');
        if (j === m.correct) oel.classList.add('correct');
        else if (j === chosen) oel.classList.add('wrong');
      } else {
        oel.onclick = () => {
          state.mcqAnswers[lec.id + '.' + i] = j;
          saveState();
          renderNav();
          renderMain();
        };
      }
      opts.appendChild(oel);
    });
    el.appendChild(opts);

    const exp = document.createElement('div'); exp.className = 'explanation';
    exp.textContent = m.explanation;
    el.appendChild(exp);

    panel.appendChild(el);
  });
}

function renderShort(panel, lec) {
  lec.short_answer.forEach((s, i) => {
    const el = document.createElement('div'); el.className = 'sa';
    const p = document.createElement('div'); p.className = 'prompt'; p.textContent = 'Q' + (i + 1) + '. ' + s.prompt;
    const ta = document.createElement('textarea'); ta.placeholder = 'Write your answer here, then reveal to compare.';
    const btn = document.createElement('button'); btn.className = 'reveal-btn'; btn.textContent = 'Reveal sample answer';
    const ans = document.createElement('div'); ans.className = 'answer'; ans.textContent = s.sample_answer;
    if (state.saRevealed[lec.id + '.' + i]) el.classList.add('revealed');
    btn.onclick = () => { el.classList.add('revealed'); state.saRevealed[lec.id + '.' + i] = true; saveState(); };
    el.appendChild(p); el.appendChild(ta); el.appendChild(btn); el.appendChild(ans);
    panel.appendChild(el);
  });
}

function renderPitfalls(panel, lec) {
  const list = document.createElement('div'); list.className = 'pitfalls';
  (lec.pitfalls || []).forEach(p => {
    const el = document.createElement('div'); el.className = 'pitfall';
    const icon = document.createElement('span'); icon.className = 'icon'; icon.textContent = '!';
    const txt = document.createElement('span'); txt.textContent = p;
    el.appendChild(icon); el.appendChild(txt);
    list.appendChild(el);
  });
  panel.appendChild(list);
}

function escapeHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

document.getElementById('reset-progress').onclick = () => {
  if (!confirm('Reset all progress on all lectures?')) return;
  state.mcqAnswers = {};
  state.fcKnown = {};
  state.saRevealed = {};
  saveState();
  renderNav();
  renderMain();
};

loadState();
renderNav();
renderMain();
</script>
</body>
</html>
